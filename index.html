              {/* Hint */}
              {!is360 && !lightbox.type.startsWith("image/") && (
                <div style={{ position: "absolute", bottom: "16px", fontFamily: G.fontMono, fontSize: "11px", color: "rgba(255,255,255,0.25)" }}>
                  clicca fuori per chiudere
                </div>
              )}
            </div>
          );
        })()}
      </>
    );
  };

  // ─ CINEMATIC ─
  if (phase === "cinematic") {
    return <CinematicIntro images={game.cinematicImages || []} onComplete={() => setPhase("intro")} />;
  }

  // ─ INTRO ─
  if (phase === "intro") {
    return (
      <div style={{ minHeight: "100vh", padding: "40px 20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div style={{ maxWidth: "700px", width: "100%", animation: "fadeInUp 0.7s ease" }}>
          <div style={{ textAlign: "center", marginBottom: "40px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "20px", marginBottom: "20px", flexWrap: "wrap" }}>
              {game.clientLogo && (
                <div style={{ background: "#fff", borderRadius: "8px", padding: "8px 14px" }}>
                  <img src={game.clientLogo} alt="Logo Cliente" style={{ height: "52px", maxWidth: "160px", objectFit: "contain", display: "block" }} />
                </div>
              )}
              <div style={{ background: "#fff", borderRadius: "8px", padding: "8px 14px" }}>
                <img src={TEAM_NOW_LOGO} alt="Team Now" style={{ height: "40px", display: "block" }} />
              </div>
            </div>
            <div style={{ ...styles.tag, marginBottom: "16px" }}>Partita: {game.name}</div>
            <h1 style={{ ...styles.title, fontSize: "clamp(2rem,6vw,3.5rem)" }}>BENVENUTO, AGENTE</h1>
          </div>
          <div style={{ ...styles.card, marginBottom: "32px" }}>
            <TypewriterVoice
              text={game.story || "La tua missione inizia ora…"}
              speed={28}
              voiceDelay={600}
            />
          </div>
          <div style={{ textAlign: "center" }}>
            <button className="btn-gold" style={{ ...styles.btnPrimary, padding: "16px 48px", fontSize: "18px" }} onClick={() => setPhase("enigma")}>
              ▶ INIZIA LA MISSIONE
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─ COMPLETE ─
  if (phase === "complete") {
    const maxPossible = game.enigmas.length * 10;
    const pct = maxPossible > 0 ? Math.round((totalScore / maxPossible) * 100) : 0;
    const medal = pct >= 80 ? "🥇" : pct >= 50 ? "🥈" : "🥉";

    // Show victory cinematic first
    if (!victoryDone) {
      return (
        <VictoryScreen
          playerName={playerName}
          gameName={game.name}
          totalScore={totalScore}
          maxScore={maxPossible}
          clientLogo={game.clientLogo || null}
          onComplete={() => setVictoryDone(true)}
        />
      );
    }

    return (
      <div style={{ minHeight: "calc(100vh - 56px)", padding: "24px 20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div style={{ maxWidth: "600px", width: "100%", animation: "enigma-reveal 0.8s ease" }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: "32px" }}>
            <div style={{ fontSize: "72px", marginBottom: "12px" }}>{medal}</div>
            <h1 style={{ ...styles.title, fontSize: "clamp(1.8rem,6vw,3rem)", marginBottom: "8px" }}>MISSIONE COMPLETATA</h1>
            <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "13px" }}>
              {playerName} — {game.name}
            </p>
          </div>

          {/* Total score hero */}
          <div style={{ ...styles.card, textAlign: "center", marginBottom: "24px", border: "1px solid rgba(201,168,76,0.4)", background: "rgba(201,168,76,0.06)" }}>
            <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.muted, letterSpacing: "3px", marginBottom: "8px" }}>PUNTEGGIO FINALE</div>
            <div style={{ fontFamily: G.fontMono, fontSize: "clamp(3rem,12vw,5rem)", fontWeight: "bold", color: G.gold, lineHeight: 1 }}>
              {totalScore}
            </div>
            <div style={{ fontFamily: G.fontMono, fontSize: "14px", color: G.muted, marginTop: "4px" }}>
              su {maxPossible} punti possibili ({pct}%)
            </div>
          </div>

          {/* Per-enigma breakdown */}
          {scores.length > 0 && (
            <div style={{ ...styles.card, marginBottom: "24px" }}>
              <h3 style={{ ...styles.title, fontSize: "14px", marginBottom: "16px", letterSpacing: "2px" }}>📋 DETTAGLIO ENIGMI</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                {scores.map((s, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 14px",
                    background: G.bg3, borderRadius: "4px", border: `1px solid ${G.border}` }}>
                    <span style={{ ...styles.tag, flexShrink: 0 }}>{i + 1}</span>
                    <span style={{ flex: 1, fontSize: "14px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.title}</span>
                    <span style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.muted, flexShrink: 0 }}>
                      {Math.floor(s.elapsed / 60)}:{String(s.elapsed % 60).padStart(2, "0")}
                    </span>
                    {s.expired && <span style={{ fontFamily: G.fontMono, fontSize: "9px", color: "#c0392b", flexShrink: 0 }}>-3</span>}
                    <span style={{ fontFamily: G.fontMono, fontSize: "18px", fontWeight: "bold", flexShrink: 0,
                      color: s.score >= 7 ? G.success : s.score >= 4 ? G.gold : G.red }}>
                      {s.score}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ textAlign: "center" }}>
            <button className="btn-gold" style={styles.btnPrimary} onClick={onBack}>← Torna alla Home</button>
          </div>
        </div>
      </div>
    );
  }

  // ─ ENIGMA ─
  if (phase === "enigma") {
    // Enigma is accessible when: no coords set, geo error, OR player has reached the spot
    const coords = getCoords();
    const enigmaAccessible = !coords || geoStatus === "error" || geoStatus === "nocoords" || unlockedState;

    // ── WAITING SCREEN: GPS coords set but player hasn't arrived yet ──
    if (coords && !unlockedState) {
      return (
        <div style={{ minHeight: "calc(100vh - 56px)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px" }}>
          <div style={{ maxWidth: "520px", width: "100%", textAlign: "center", animation: "enigma-reveal 0.5s ease" }}>
            {/* Progress */}
            <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "32px" }}>
              <span style={{ ...styles.tag }}>Enigma {enigmaIdx + 1} / {game.enigmas.length}</span>
              <div style={{ flex: 1, height: "2px", background: G.border }}>
                <div style={{ height: "100%", background: G.gold, width: `${(enigmaIdx / game.enigmas.length) * 100}%`, transition: "width 0.5s ease" }} />
              </div>
            </div>

            {(geoStatus === "idle" || geoStatus === "checking") ? (
              <div style={{ ...styles.card }}>
                <div style={{ fontSize: "56px", marginBottom: "16px", animation: "spin 2s linear infinite", display: "inline-block" }}>🧭</div>
                <h2 style={{ ...styles.title, fontSize: "22px", marginBottom: "8px" }}>RILEVAMENTO POSIZIONE</h2>
                <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "13px" }}>Acquisizione segnale GPS in corso…</p>
                <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "11px", marginTop: "8px" }}>Assicurati di aver autorizzato la posizione nel browser</p>
              </div>
            ) : geoStatus === "error" ? (
              <GeoFallback
                enigma={enigma}
                adminPassword={game.code || ""}
                onUnlock={() => {
                  unlockedRef.current = true;
                  setUnlockedState(true);
                  setGeoStatus("near");
                  setEnigmaStartTime(Date.now());
                  setTimerExpired(false);
                }}
                onRetry={startGeo}
              />
            ) : (
              <div style={{ ...styles.card, border: `1px solid rgba(192,57,43,0.4)`, background: "rgba(192,57,43,0.06)" }}>
                {/* Radar animation */}
                <div style={{ position: "relative", width: "120px", height: "120px", margin: "0 auto 24px" }}>
                  <div style={{ position: "absolute", inset: 0, borderRadius: "50%", border: `2px solid rgba(192,57,43,0.3)` }} />
                  <div style={{ position: "absolute", inset: "16px", borderRadius: "50%", border: `2px solid rgba(192,57,43,0.2)` }} />
                  <div style={{ position: "absolute", inset: "32px", borderRadius: "50%", border: `2px solid rgba(192,57,43,0.15)` }} />
                  <div style={{ position: "absolute", inset: "44px", borderRadius: "50%", border: `1px solid rgba(201,168,76,0.4)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: "24px" }}>📍</span>
                  </div>
                  {/* rotating beam */}
                  <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: "conic-gradient(from 0deg, transparent 70%, rgba(192,57,43,0.4) 100%)", animation: "spin 2s linear infinite" }} />
                </div>

                <h2 style={{ ...styles.title, fontSize: "22px", marginBottom: "8px", color: "#e05555" }}>DESTINAZIONE NON RAGGIUNTA</h2>
                <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "20px" }}>
                  L'enigma si sbloccherà automaticamente<br />quando sarai entro {GEO_RADIUS} metri dal punto
                </p>

                {/* Distance badge */}
                {distance !== null && (
                  <div style={{ display: "inline-block", background: G.bg3, border: `1px solid ${G.border}`, borderRadius: "40px", padding: "10px 28px", marginBottom: "20px" }}>
                    <span style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.muted, letterSpacing: "2px", display: "block", marginBottom: "2px" }}>DISTANZA</span>
                    <span style={{ fontFamily: G.fontMono, fontSize: "28px", fontWeight: "bold", color: distance > 200 ? G.red : distance > GEO_RADIUS ? "#e0a020" : G.success }}>
                      {distance > 999 ? `${(distance / 1000).toFixed(1)} km` : `${distance} m`}
                    </span>
                  </div>
                )}

                <div style={{ marginBottom: "20px" }}>
                  <a
                    href={`https://maps.google.com/?q=${enigma.lat},${enigma.lng}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="btn-gold"
                    style={{ ...styles.btnPrimary, display: "inline-block", textDecoration: "none", padding: "12px 28px" }}
                  >
                    🗺 APRI SU GOOGLE MAPS
                  </a>
                </div>

                <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "11px", letterSpacing: "1px" }}>
                  GPS attivo — aggiornamento automatico
                </p>
              </div>
            )}

            {/* AgentX also available while waiting */}
            <div style={{ marginTop: "20px" }}>
              <button
                style={{ ...styles.btn, padding: "8px 20px", fontSize: "12px", color: agentOpen ? G.goldLight : G.muted, borderColor: agentOpen ? G.gold : G.border }}
                onClick={() => setAgentOpen(!agentOpen)}
              >
                🤖 Chiedi ad AgentX
              </button>
            </div>
          </div>
          {agentOpen && <AgentXChat game={game} currentEnigma={null} onClose={() => setAgentOpen(false)} onUserMessage={handleAgentXMessage} />}
        </div>
      );
    }

    // ── ENIGMA UNLOCKED (no coords, geo error, or player arrived) ──
    return (
      <div style={{ minHeight: "calc(100vh - 56px)", padding: "20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div style={{ maxWidth: "700px", width: "100%", animation: "enigma-reveal 0.5s ease" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "16px", flexWrap: "wrap" }}>
            <span style={{ ...styles.tag }}>Enigma {enigmaIdx + 1} / {game.enigmas.length}</span>
            <div style={{ flex: 1, minWidth: "60px", height: "2px", background: G.border }}>
              <div style={{ height: "100%", background: G.gold, width: `${(enigmaIdx / game.enigmas.length) * 100}%`, transition: "width 0.5s ease" }} />
            </div>
            {/* Score running total */}
            {scores.length > 0 && (
              <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.gold, background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.3)", borderRadius: "4px", padding: "3px 10px", letterSpacing: "1px" }}>
                ★ {totalScore} pt
              </div>
            )}
            <button style={{ ...styles.btn, padding: "4px 12px", fontSize: "11px", color: agentOpen ? G.goldLight : G.muted, borderColor: agentOpen ? G.gold : G.muted }} onClick={() => setAgentOpen(!agentOpen)}>
              🤖 AgentX
            </button>
          </div>

          {/* Timer */}
          {enigmaStartTime && (
            <div style={{ marginBottom: "16px" }}>
              <EnigmaTimer
                startTime={enigmaStartTime}
                onExpired={() => setTimerExpired(true)}
              />
            </div>
          )}

          {/* Badge "posizione verificata" se si è arrivati via GPS */}
          {unlockedState && getCoords() && (
            <div style={{ ...styles.card, marginBottom: "16px", padding: "10px 16px", background: "rgba(46,204,113,0.07)", border: `1px solid rgba(46,204,113,0.3)`, display: "flex", alignItems: "center", gap: "10px" }}>
              <span style={{ fontSize: "18px" }}>✅</span>
              <span style={{ fontFamily: G.fontMono, fontSize: "12px", color: G.success, letterSpacing: "1px" }}>POSIZIONE VERIFICATA — Enigma sbloccato{distance !== null ? ` (${distance}m)` : ""}</span>
            </div>
          )}

          {/* Geo error notice */}
          {geoStatus === "error" && (
            <div style={{ ...styles.card, marginBottom: "16px", padding: "10px 16px", textAlign: "center", color: G.muted, fontSize: "13px" }}>
              ⚠️ GPS non disponibile — enigma accessibile senza verifica posizione
            </div>
          )}

          {enigma.type === "video-challenge" ? (
            <div style={{ ...styles.card, marginBottom: "20px", border: "1px solid rgba(192,57,43,0.3)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                <h2 style={{ ...styles.title, fontSize: "22px", margin: 0, flex: 1 }}>{enigma.title}</h2>
                <span style={{ fontFamily: G.fontMono, fontSize: "9px", color: "#c0392b",
                  letterSpacing: "2px", background: "rgba(192,57,43,0.1)",
                  border: "1px solid rgba(192,57,43,0.3)", borderRadius: "4px", padding: "3px 10px" }}>
                  🎥 SFIDA VIDEO
                </span>
              </div>
              <VideoEnigmaPlayer
                enigma={enigma}
                playerName={playerName}
                gameName={game.name}
                onComplete={() => {
                  const score = 8;
                  const entry = { idx: enigmaIdx, title: enigma.title || "Sfida Video", score, elapsed: 0, expired: false };
                  setScores(prev => [...prev, entry]);
                  if (isLast) setPhase("complete");
                  else { setEnigmaIdx(idx => idx + 1); setPhase("post"); }
                }}
              />
            </div>
          ) : (
            <>
              <div style={{ ...styles.card, marginBottom: "20px" }}>
                <h2 style={{ ...styles.title, fontSize: "24px", marginBottom: "16px" }}>{enigma.title}</h2>
                {enigma.description && (
                  <div style={{ marginBottom: "20px" }}>
                    <TypewriterVoice
                      key={`desc-${enigmaIdx}`}
                      text={enigma.description}
                      speed={26}
                      voiceDelay={500}
                    />
                  </div>
                )}
                {renderLinks(enigma.webLinks)}
                <YouTubePlayer url={enigma.youtube} autoplay />
                {renderFiles(enigma.files)}
              </div>

              {enigma.puzzle && (
                <div style={{ ...styles.card, marginBottom: "20px", border: `1px solid rgba(201,168,76,0.3)`, background: "rgba(201,168,76,0.04)" }}>
                  <div style={{ ...styles.tag, marginBottom: "12px" }}>🧩 L'ENIGMA</div>
                  <TypewriterVoice
                    key={`puzzle-${enigmaIdx}`}
                    text={enigma.puzzle}
                    speed={30}
                    voiceDelay={enigma.description ? (enigma.description.length * 26 + 1200) : 400}
                    autoPlay={!enigma.description}
                  />
                </div>
              )}

              <div style={{ ...styles.card }}>
                <Input label="La tua risposta" value={answer} onChange={setAnswer} placeholder="Inserisci qui la risposta…" style={{ fontSize: "18px" }} />
                {error && <p style={{ color: G.red, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "12px" }}>{error}</p>}
                <button className="btn-gold" style={{ ...styles.btnPrimary, width: "100%", padding: "14px" }} onClick={checkAnswer}>
                  VERIFICA RISPOSTA →
                </button>
              </div>
            </>
          )}
        </div>
        {enigma.type !== "video-challenge" && agentOpen && <AgentXChat game={game} currentEnigma={enigma} onClose={() => setAgentOpen(false)} onUserMessage={handleAgentXMessage} />}
      </div>
    );
  }

  // ─ POST ─
  if (phase === "post") {
    return (
      <div style={{ minHeight: "calc(100vh - 56px)", padding: "20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div style={{ maxWidth: "700px", width: "100%", animation: "enigma-reveal 0.6s ease" }}>
          <div style={{ textAlign: "center", marginBottom: "32px" }}>
            <div style={{ fontSize: "56px", marginBottom: "12px", animation: "pulse-gold 2s infinite" }}>✅</div>
            <h2 style={{ ...styles.title, fontSize: "26px" }}>RISPOSTA CORRETTA</h2>
            {/* Score badge for this enigma */}
            {scores.length > 0 && (() => {
              const last = scores[scores.length - 1];
              return (
                <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: "4px", marginTop: "16px",
                  background: "rgba(201,168,76,0.08)", border: "1px solid rgba(201,168,76,0.3)", borderRadius: "8px", padding: "14px 28px" }}>
                  <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: G.muted, letterSpacing: "2px" }}>PUNTEGGIO ENIGMA</div>
                  <div style={{ fontFamily: G.fontMono, fontSize: "36px", fontWeight: "bold", color: last.score >= 7 ? G.success : last.score >= 4 ? G.gold : G.red }}>
                    {last.score} / 10
                  </div>
                  {last.expired && (
                    <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: "#c0392b", letterSpacing: "1px" }}>⏱ -3 handicap tempo</div>
                  )}
                  <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: G.muted }}>
                    risolto in {Math.floor(last.elapsed / 60)}:{String(last.elapsed % 60).padStart(2, "0")}
                  </div>
                  <div style={{ marginTop: "6px", fontFamily: G.fontMono, fontSize: "11px", color: G.gold }}>
                    Totale: ★ {totalScore} pt
                  </div>
                </div>
              );
            })()}
          </div>
          {enigma.postStory && (
            <div style={{ ...styles.card, marginBottom: "20px", border: `1px solid rgba(201,168,76,0.2)` }}>
              <TypewriterVoice
                key={`post-${enigmaIdx}`}
                text={enigma.postStory}
                speed={28}
                voiceDelay={500}
              />
            </div>
          )}
          {enigma.postLinks && (
            <div style={{ ...styles.card, marginBottom: "20px" }}>
              {renderLinks(enigma.postLinks)}
            </div>
          )}
          {enigma.postYoutube && ytId(enigma.postYoutube) && (
            <div style={{ marginBottom: "20px" }}><YouTubePlayer url={enigma.postYoutube} autoplay /></div>
          )}

          {/* ── Prossima destinazione GPS ── */}
          {!isLast && enigma.postLat && enigma.postLng && !isNaN(parseFloat(enigma.postLat)) && !isNaN(parseFloat(enigma.postLng)) && (
            <div style={{
              ...styles.card,
              marginBottom: "24px",
              border: `1px solid rgba(201,168,76,0.4)`,
              background: "rgba(201,168,76,0.06)",
              textAlign: "center"
            }}>
              <div style={{ fontSize: "36px", marginBottom: "10px" }}>🧭</div>
              <h3 style={{ ...styles.title, fontSize: "18px", marginBottom: "8px" }}>PROSSIMA DESTINAZIONE</h3>
              <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "18px", letterSpacing: "1px" }}>
                Raggiungi le seguenti coordinate per sbloccare il prossimo enigma
              </p>
              <div style={{ display: "flex", justifyContent: "center", gap: "16px", marginBottom: "20px", flexWrap: "wrap" }}>
                <div style={{ ...styles.card, padding: "12px 20px", background: G.bg3, textAlign: "center", minWidth: "130px" }}>
                  <div style={{ color: G.gold, fontFamily: G.fontMono, fontSize: "11px", letterSpacing: "2px", marginBottom: "4px" }}>LAT</div>
                  <div style={{ fontFamily: G.fontMono, fontSize: "16px", fontWeight: "bold" }}>{parseFloat(enigma.postLat).toFixed(5)}</div>
                </div>
                <div style={{ ...styles.card, padding: "12px 20px", background: G.bg3, textAlign: "center", minWidth: "130px" }}>
                  <div style={{ color: G.gold, fontFamily: G.fontMono, fontSize: "11px", letterSpacing: "2px", marginBottom: "4px" }}>LNG</div>
                  <div style={{ fontFamily: G.fontMono, fontSize: "16px", fontWeight: "bold" }}>{parseFloat(enigma.postLng).toFixed(5)}</div>
                </div>
              </div>
              <a
                href={`https://maps.google.com/?q=${enigma.postLat},${enigma.postLng}`}
                target="_blank"
                rel="noopener noreferrer"
                className="btn-gold"
                style={{ ...styles.btnPrimary, display: "inline-block", padding: "12px 32px", textDecoration: "none", fontSize: "13px" }}
              >
                🗺 APRI SU GOOGLE MAPS
              </a>
            </div>
          )}
          <div style={{ textAlign: "center" }}>
            <button className="btn-gold" style={{ ...styles.btnPrimary, padding: "16px 48px", fontSize: "18px" }} onClick={nextEnigma}>
              {isLast ? "🏁 COMPLETA MISSIONE" : "→ PROSSIMO ENIGMA"}
            </button>
          </div>
        </div>
        {agentOpen && <AgentXChat game={game} currentEnigma={enigma} onClose={() => setAgentOpen(false)} onUserMessage={handleAgentXMessage} />}
      </div>
    );
  }
  return null;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("home");
  const [adminAuth, setAdminAuth] = useState(false);
  const [adminPassword, setAdminPassword] = useState("3333");
  const [games, setGames] = useState([]);
  const [editingGame, setEditingGame] = useState(null);
  const [playerGame, setPlayerGame] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [muted, setMuted] = useState(false);

  // Load from storage
  useEffect(() => {
    (async () => {
      try {
        const gRes = await window.storage.get("escape_games");
        if (gRes) setGames(JSON.parse(gRes.value));
        const pRes = await window.storage.get("escape_admin_pwd");
        if (pRes) setAdminPassword(pRes.value);
      } catch {}
      setLoaded(true);
    })();
  }, []);

  // Save games
  const saveGames = async (g) => {
    setGames(g);
    try { await window.storage.set("escape_games", JSON.stringify(g)); } catch {}
  };

  const savePwd = async (p) => {
    setAdminPassword(p);
    try { await window.storage.set("escape_admin_pwd", p); } catch {}
  };

  if (!loaded) {
    return (
      <div style={{ ...styles.app, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
        <div style={{ textAlign: "center", color: G.muted, fontFamily: G.fontMono }}>
          <div style={{ fontSize: "32px", animation: "spin 1s linear infinite", display: "inline-block" }}>◌</div>
          <p>Inizializzazione sistema…</p>
        </div>
      </div>
    );
  }

  return (
    <MuteContext.Provider value={{ muted, setMuted }}>
    <div style={styles.app}>
      {/* ── Navbar globale sempre visibile ── */}
      <div style={{
        background: G.bg2,
        borderBottom: `1px solid ${G.border}`,
        padding: "0 20px",
        display: "flex",
        alignItems: "center",
        gap: "16px",
        height: "56px",
        position: "sticky",
        top: 0,
        zIndex: 500,
        boxShadow: "0 2px 20px rgba(0,0,0,0.5)"
      }}>
        {/* Breadcrumb / nome partita */}
        <div style={{ flex: 1, display: "flex", alignItems: "center", gap: "10px" }}>
          {view === "player-game" && playerGame && (
            <>
              <span style={{ ...styles.tag }}>{playerGame.name}</span>
              {playerGame._playerName && (
                <span style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.gold, letterSpacing: "1px" }}>
                  👤 {playerGame._playerName}
                </span>
              )}
            </>
          )}
          {view === "admin-game" && editingGame && <span style={{ ...styles.tag }}>Editor Enigmi</span>}
          {view === "admin-dashboard" && <span style={{ ...styles.tag }}>Pannello Admin</span>}
          {view === "admin-login" && <span style={{ ...styles.tag }}>Accesso Admin</span>}
          {view === "player-login" && <span style={{ ...styles.tag }}>Accesso Giocatore</span>}
        </div>

        {/* Pulsante Home — su ogni pagina tranne home */}
        {view !== "home" && (
          <button
            className="btn-outline"
            style={{ ...styles.btn, padding: "6px 16px", fontSize: "12px", display: "flex", alignItems: "center", gap: "6px" }}
            onClick={() => { setView("home"); setPlayerGame(null); }}
          >
            ⌂ HOME
          </button>
        )}

        {/* Mute toggle — sempre visibile */}
        <button
          onClick={() => {
            const next = !muted;
            setMuted(next);
            if (next) window.speechSynthesis?.cancel();
          }}
          title={muted ? "Riattiva audio" : "Disattiva audio"}
          style={{
            background: muted ? "rgba(192,57,43,0.15)" : "rgba(255,255,255,0.05)",
            border: `1px solid ${muted ? "rgba(192,57,43,0.5)" : "rgba(255,255,255,0.12)"}`,
            borderRadius: "50%", width: "36px", height: "36px",
            display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", fontSize: "17px", flexShrink: 0,
            transition: "all 0.15s",
          }}
        >
          {muted ? "🔇" : "🔊"}
        </button>
      </div>

      {/* Views */}
      {view === "home" && (
        <HomeView
          onPlayer={() => setView("player-login")}
          onAdmin={() => setView("admin-login")}
        />
      )}

      {view === "admin-login" && (
        <AdminLogin
          adminPassword={adminPassword}
          onSuccess={() => { setAdminAuth(true); setView("admin-dashboard"); }}
          onBack={() => setView("home")}
        />
      )}

      {view === "admin-dashboard" && adminAuth && (
        <div style={{ padding: "20px 0" }}>
          <AdminDashboard
            games={games}
            adminPassword={adminPassword}
            onEdit={(g) => { setEditingGame(games.find(x => x.id === g.id) || g); setView("admin-game"); }}
            onNewGame={async () => { const g = EMPTY_GAME(); const ng = [...games, g]; await saveGames(ng); setEditingGame(g); setView("admin-game"); }}
            onDeleteGame={async (id) => {
              // Wipe all scores and agentlogs for this game
              try {
                const sk = await window.storage.list(`scores:${id}:`);
                for (const k of (sk?.keys || [])) { try { await window.storage.delete(k); } catch {} }
                const lk = await window.storage.list(`agentlog:${id}:`);
                for (const k of (lk?.keys || [])) { try { await window.storage.delete(k); } catch {} }
              } catch {}
              saveGames(games.filter((g) => g.id !== id));
            }}
            onChangePassword={savePwd}
            onBack={() => setView("home")}
          />
        </div>
      )}

      {view === "admin-game" && adminAuth && editingGame && (
        <div style={{ padding: "20px 0" }}>
          <AdminGameEditor
            game={editingGame}
            onSave={(g) => { const ng = games.map((x) => (x.id === g.id ? g : x)); saveGames(ng); setEditingGame(g); setView("admin-dashboard"); }}
            onBack={() => setView("admin-dashboard")}
          />
        </div>
      )}

      {view === "player-login" && (
        <PlayerLogin
          games={games}
          onEnter={(g, player) => { setPlayerGame({ ...g, _playerName: player.name, _playerCode: player.code }); setView("player-game"); }}
          onBack={() => setView("home")}
        />
      )}

      {view === "player-game" && playerGame && (
        <PlayerGameView
          game={playerGame}
          onBack={() => { setPlayerGame(null); setView("home"); }}
        />
      )}
    </div>
    </MuteContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
