// ─── 360° PANORAMA VIEWER (WebGL via Three.js r128) ─────────────────────────
// compact=false → fullscreen lightbox version (with toolbar + footer)
// compact=true  → inline in-game version (fills parent container)
function Panorama360Viewer({ src, compact = false }) {
  const mountRef = useRef(null);
  const stateRef = useRef({
    yaw: 0, pitch: 0, fov: 75,
    dragging: false, lastX: 0, lastY: 0,
    animId: null, renderer: null,
  });
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(false);

  useEffect(() => {
    const el = mountRef.current;
    if (!el) return;
    const s = stateRef.current;
    // reset state on new src
    s.yaw = 0; s.pitch = 0; s.fov = 75; s.dragging = false;
    setLoading(true); setError(false);

    const loadThree = () => new Promise((resolve, reject) => {
      if (window.THREE) { resolve(window.THREE); return; }
      const sc = document.createElement("script");
      sc.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
      sc.onload = () => resolve(window.THREE);
      sc.onerror = reject;
      document.head.appendChild(sc);
    });

    let cancelled = false;
    loadThree().then((THREE) => {
      if (cancelled) return;
      const W = el.clientWidth  || 800;
      const H = el.clientHeight || 420;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(W, H);
      renderer.domElement.style.display = "block";
      renderer.domElement.style.width   = "100%";
      renderer.domElement.style.height  = "100%";
      el.appendChild(renderer.domElement);
      s.renderer = renderer;

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, W / H, 0.1, 1000);

      const geo = new THREE.SphereGeometry(500, 64, 48);
      geo.scale(-1, 1, 1);
      const tex = new THREE.TextureLoader().load(
        src,
        () => { if (!cancelled) setLoading(false); },
        undefined,
        () => { if (!cancelled) setError(true); }
      );
      scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: tex })));

      let autoYaw = 0;
      const tick = () => {
        s.animId = requestAnimationFrame(tick);
        if (!s.dragging) autoYaw += 0.04;
        camera.rotation.set(
          s.pitch * Math.PI / 180,
          (s.yaw + autoYaw) * Math.PI / 180,
          0, "YXZ"
        );
        camera.fov = s.fov;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      };
      tick();
    }).catch(() => { if (!cancelled) setError(true); });

    return () => {
      cancelled = true;
      if (s.animId) cancelAnimationFrame(s.animId);
      if (s.renderer) {
        s.renderer.dispose();
        if (s.renderer.domElement.parentNode === el) el.removeChild(s.renderer.domElement);
        s.renderer = null;
      }
    };
  }, [src]);

  const coord = (e) => ({
    x: e.touches ? e.touches[0].clientX : e.clientX,
    y: e.touches ? e.touches[0].clientY : e.clientY,
  });
  const onDown  = (e) => { const s = stateRef.current; s.dragging = true; const c = coord(e); s.lastX = c.x; s.lastY = c.y; };
  const onMove  = (e) => { const s = stateRef.current; if (!s.dragging) return; const c = coord(e); s.yaw -= (c.x - s.lastX) * 0.25; s.pitch = Math.max(-85, Math.min(85, s.pitch - (c.y - s.lastY) * 0.25)); s.lastX = c.x; s.lastY = c.y; };
  const onUp    = ()  => { stateRef.current.dragging = false; };
  const onWheel = (e) => { e.preventDefault(); const s = stateRef.current; s.fov = Math.max(30, Math.min(110, s.fov + e.deltaY * 0.04)); };

  if (compact) {
    // ── INLINE VERSION (inside the game, full-width card) ──────────────────
    return (
      <div
        onClick={e => e.stopPropagation()}
        style={{ width: "100%", display: "flex", flexDirection: "column" }}
      >
        {/* Viewer canvas */}
        <div
          ref={mountRef}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
          onWheel={onWheel}
          style={{
            width: "100%", height: "clamp(240px, 45vw, 460px)",
            position: "relative", background: "#0a0a0a", cursor: "grab", overflow: "hidden",
          }}
        >
          {loading && !error && (
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "12px" }}>
              <div style={{ width: "36px", height: "36px", border: "3px solid rgba(201,168,76,0.15)", borderTop: "3px solid #c9a84c", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
              <span style={{ fontFamily: "'Courier New',monospace", fontSize: "10px", color: "rgba(201,168,76,0.5)", letterSpacing: "2px" }}>CARICAMENTO…</span>
            </div>
          )}
          {error && (
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontFamily: "'Courier New',monospace", fontSize: "11px", color: "#c9a84c" }}>⚠ impossibile caricare il panorama</span>
            </div>
          )}
          {/* Inline hint overlay */}
          {!loading && !error && (
            <div style={{ position: "absolute", bottom: "10px", left: "50%", transform: "translateX(-50%)", background: "rgba(0,0,0,0.55)", borderRadius: "20px", padding: "4px 14px", fontFamily: "'Courier New',monospace", fontSize: "10px", color: "rgba(255,255,255,0.35)", letterSpacing: "1px", pointerEvents: "none", whiteSpace: "nowrap" }}>
              🖱 trascina · scroll per zoom
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── FULLSCREEN LIGHTBOX VERSION ──────────────────────────────────────────
  return (
    <div onClick={e => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "14px", width: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "16px", background: "rgba(0,0,0,0.6)", border: "1px solid rgba(201,168,76,0.3)", borderRadius: "20px", padding: "6px 22px" }}>
        <span style={{ fontFamily: "'Courier New',monospace", fontSize: "11px", color: "#c9a84c", letterSpacing: "2px" }}>🌐 PANORAMA 360°</span>
        <span style={{ fontFamily: "'Courier New',monospace", fontSize: "10px", color: "rgba(255,255,255,0.35)" }}>trascina · scroll per zoom</span>
      </div>
      <div
        ref={mountRef}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
        onWheel={onWheel}
        style={{
          width: "min(900px, 92vw)", height: "min(506px, 56vh)",
          borderRadius: "10px", overflow: "hidden",
          border: "1px solid rgba(201,168,76,0.2)",
          boxShadow: "0 0 80px rgba(0,0,0,0.95)",
          cursor: "grab", position: "relative", background: "#000",
        }}
      >
        {loading && !error && (
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "14px" }}>
            <div style={{ width: "40px", height: "40px", border: "3px solid rgba(201,168,76,0.2)", borderTop: "3px solid #c9a84c", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
            <span style={{ fontFamily: "'Courier New',monospace", fontSize: "11px", color: "rgba(201,168,76,0.6)", letterSpacing: "2px" }}>CARICAMENTO PANORAMA…</span>
          </div>
        )}
        {error && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'Courier New',monospace", fontSize: "12px", color: "#c9a84c" }}>⚠ impossibile caricare il panorama</span>
          </div>
        )}
      </div>
      <div style={{ fontFamily: "'Courier New',monospace", fontSize: "10px", color: "rgba(255,255,255,0.2)" }}>clicca fuori per chiudere</div>
    </div>
  );
}

// ─── Rileva se un file è un'immagine 360° ────────────────────────────────────
// Controlla il flag esplicito is360 oppure parole chiave nel nome file
function is360Image(f) {
  if (f.is360 === true) return true;
  return /360|panoram|equirect|pano|sphere|vr_|_vr|photo.?sphere/i.test(f.name || "");
}

function ImageViewer({ src, alt }) {
  const canvasRef  = useRef(null);
  const imgRef     = useRef(null);
  const drawingRef = useRef(false);
  const lastPosRef = useRef(null);
  const [mode,       setMode]       = useState("view");   // "view" | "lens" | "draw" | "erase"
  const [lensZoom,   setLensZoom]   = useState(3);
  const [lens,       setLens]       = useState(null);
  const LENS_SIZE = 200;
  const [drawColor,  setDrawColor]  = useState("#ff3333");
  const [brushSize,  setBrushSize]  = useState(4);
  const [eraserSize, setEraserSize] = useState(24);
  const [hasDrawing, setHasDrawing] = useState(false);

  const onImgLoad = () => {
    const img = imgRef.current; const cv = canvasRef.current;
    if (!img || !cv) return;
    cv.width = img.naturalWidth; cv.height = img.naturalHeight;
  };

  const coord = (e) => ({
    x: e.touches ? e.touches[0].clientX : e.clientX,
    y: e.touches ? e.touches[0].clientY : e.clientY,
  });

  // ── Lens handlers ──────────────────────────────────────────────────────────
  const onLensMove = (e) => {
    if (mode !== "lens") return;
    const img = imgRef.current; if (!img) return;
    const rect = img.getBoundingClientRect();
    const { x: cx, y: cy } = coord(e);
    const rx = Math.max(0, Math.min(cx - rect.left, rect.width));
    const ry = Math.max(0, Math.min(cy - rect.top,  rect.height));
    setLens({
      screenX: cx - LENS_SIZE / 2,
      screenY: cy - LENS_SIZE / 2,
      bgX: -(rx * lensZoom - LENS_SIZE / 2),
      bgY: -(ry * lensZoom - LENS_SIZE / 2),
      imgW: rect.width, imgH: rect.height,
    });
  };
  const onLensLeave = () => setLens(null);

  // ── Draw/Erase handlers ────────────────────────────────────────────────────
  const canvasCoord = (e) => {
    const cv = canvasRef.current; if (!cv) return null;
    const r = cv.getBoundingClientRect();
    const { x, y } = coord(e);
    return { x: (x - r.left) * (cv.width / r.width), y: (y - r.top) * (cv.height / r.height) };
  };

  const drawStart = (e) => {
    if (mode !== "draw" && mode !== "erase") return;
    e.preventDefault(); e.stopPropagation();
    drawingRef.current = true;
    const pos = canvasCoord(e); lastPosRef.current = pos;
    const ctx = canvasRef.current?.getContext("2d");
    if (ctx && pos) {
      const sz = mode === "erase" ? eraserSize : brushSize;
      ctx.globalCompositeOperation = mode === "erase" ? "destination-out" : "source-over";
      ctx.fillStyle = drawColor;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, sz / 2, 0, Math.PI * 2); ctx.fill();
      setHasDrawing(true);
    }
  };
  const drawMove = (e) => {
    if ((mode !== "draw" && mode !== "erase") || !drawingRef.current) return;
    e.preventDefault(); e.stopPropagation();
    const pos = canvasCoord(e); const ctx = canvasRef.current?.getContext("2d");
    if (!ctx || !pos || !lastPosRef.current) return;
    const sz = mode === "erase" ? eraserSize : brushSize;
    ctx.globalCompositeOperation = mode === "erase" ? "destination-out" : "source-over";
    ctx.strokeStyle = drawColor; ctx.lineWidth = sz; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPosRef.current = pos; setHasDrawing(true);
  };
  const drawEnd = () => { drawingRef.current = false; lastPosRef.current = null; };
  const clearCanvas = () => {
    const cv = canvasRef.current; if (!cv) return;
    cv.getContext("2d").clearRect(0, 0, cv.width, cv.height); setHasDrawing(false);
  };

  const COLORS = ["#ff3333","#ff9900","#ffff00","#33ff66","#33ccff","#cc66ff","#ffffff","#000000"];
  const toolBtn = (active) => ({
    display: "flex", alignItems: "center", gap: "5px",
    padding: "6px 14px", borderRadius: "4px", cursor: "pointer", fontSize: "12px",
    fontFamily: G.fontMono, letterSpacing: "1px", transition: "all 0.15s",
    background: active ? "rgba(201,168,76,0.2)" : "rgba(255,255,255,0.05)",
    border: `1px solid ${active ? "#c9a84c" : "rgba(255,255,255,0.15)"}`,
    color: active ? "#c9a84c" : "rgba(255,255,255,0.5)",
  });

  const cursor = mode === "lens" ? "none" : mode === "draw" ? "crosshair" : mode === "erase" ? "cell" : "default";

  return (
    <div onClick={e => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "10px", width: "100%", maxWidth: "95vw" }}>

      {/* ── TOOLBAR ── */}
      <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: "6px", background: "rgba(0,0,0,0.65)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "24px", padding: "8px 16px" }}
        onClick={e => e.stopPropagation()}>

        <button style={toolBtn(mode === "lens")}  onClick={() => { setLens(null); setMode(m => m === "lens"  ? "view" : "lens");  }}>🔍 Lente</button>
        <button style={toolBtn(mode === "draw")}  onClick={() => { setLens(null); setMode(m => m === "draw"  ? "view" : "draw");  }}>✏️ Matita</button>
        <button style={toolBtn(mode === "erase")} onClick={() => { setLens(null); setMode(m => m === "erase" ? "view" : "erase"); }}>🧹 Gomma</button>

        {/* Lens zoom levels */}
        {mode === "lens" && <>
          <div style={{ width: "1px", height: "24px", background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
          {[2, 4, 6, 8, 12, 16, 20].map(z => (
            <button key={z} style={{ ...toolBtn(lensZoom === z), padding: "4px 9px", fontSize: "11px" }}
              onClick={() => setLensZoom(z)}>{z}×</button>
          ))}
          <div style={{ width: "1px", height: "24px", background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
          <input
            type="range" min="1" max="20" step="0.5" value={lensZoom}
            onChange={e => setLensZoom(Number(e.target.value))}
            style={{ width: "80px", accentColor: "#c9a84c", cursor: "pointer" }}
          />
          <span style={{ fontFamily: "'Courier New',monospace", fontSize: "11px", color: "#c9a84c", minWidth: "30px" }}>{lensZoom}×</span>
        </>}

        {/* Draw options */}
        {mode === "draw" && <>
          <div style={{ width: "1px", height: "24px", background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
          {COLORS.map(c => (
            <div key={c} onClick={() => setDrawColor(c)} style={{
              width: "18px", height: "18px", borderRadius: "50%", background: c, cursor: "pointer", flexShrink: 0,
              border: drawColor === c ? "2px solid #fff" : "2px solid rgba(255,255,255,0.15)",
              transform: drawColor === c ? "scale(1.25)" : "scale(1)", transition: "transform 0.1s",
            }} />
          ))}
          <div style={{ width: "1px", height: "20px", background: "rgba(255,255,255,0.1)" }} />
          {[2, 4, 8, 14].map(s => (
            <div key={s} onClick={() => setBrushSize(s)} style={{
              width: `${s + 8}px`, height: `${s + 8}px`, minWidth: "10px", minHeight: "10px",
              borderRadius: "50%", background: brushSize === s ? drawColor : "rgba(255,255,255,0.3)",
              cursor: "pointer", flexShrink: 0,
              border: brushSize === s ? "2px solid #fff" : "2px solid transparent",
            }} />
          ))}
        </>}

        {/* Erase options */}
        {mode === "erase" && <>
          <div style={{ width: "1px", height: "24px", background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
          {[12, 24, 48].map(s => (
            <button key={s} style={{ ...toolBtn(eraserSize === s), padding: "4px 10px", fontSize: "11px" }}
              onClick={() => setEraserSize(s)}>{s}px</button>
          ))}
        </>}

        {hasDrawing && <>
          <div style={{ width: "1px", height: "24px", background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
          <button style={{ ...toolBtn(false), padding: "4px 12px", fontSize: "11px", borderColor: "rgba(192,57,43,0.5)", color: "#e05555" }}
            onClick={clearCanvas}>✕ pulisci</button>
        </>}
      </div>

      {/* ── IMAGE + CANVAS ── */}
      <div
        style={{ position: "relative", display: "inline-flex", cursor }}
        onMouseMove={mode === "lens" ? onLensMove : (mode === "draw" || mode === "erase") ? drawMove : undefined}
        onMouseLeave={mode === "lens" ? onLensLeave : (mode === "draw" || mode === "erase") ? drawEnd : undefined}
        onMouseDown={(mode === "draw" || mode === "erase") ? drawStart : undefined}
        onMouseUp={(mode === "draw" || mode === "erase") ? drawEnd : undefined}
        onTouchStart={(mode === "draw" || mode === "erase") ? drawStart : undefined}
        onTouchMove={mode === "lens" ? onLensMove : (mode === "draw" || mode === "erase") ? drawMove : undefined}
        onTouchEnd={mode === "lens" ? onLensLeave : (mode === "draw" || mode === "erase") ? drawEnd : undefined}
      >
        <img
          ref={imgRef}
          src={src} alt={alt}
          onLoad={onImgLoad}
          draggable={false}
          style={{
            maxWidth: "98vw", maxHeight: "94vh",
            objectFit: "contain", borderRadius: "4px",
            boxShadow: "0 0 60px rgba(0,0,0,0.8)",
            display: "block", userSelect: "none",
          }}
        />
        <canvas ref={canvasRef} style={{
          position: "absolute", inset: 0, width: "100%", height: "100%",
          borderRadius: "4px", pointerEvents: "none",
        }} />
      </div>

      {/* ── FLOATING LENS ── */}
      {mode === "lens" && lens && (
        <div style={{
          position: "fixed",
          left: lens.screenX, top: lens.screenY,
          width: LENS_SIZE, height: LENS_SIZE,
          borderRadius: "50%",
          pointerEvents: "none", zIndex: 9999,
          backgroundImage: `url(${src})`,
          backgroundRepeat: "no-repeat",
          backgroundSize: `${lens.imgW * lensZoom}px ${lens.imgH * lensZoom}px`,
          backgroundPosition: `${lens.bgX}px ${lens.bgY}px`,
          border: "3px solid #c9a84c",
          boxShadow: "0 0 0 1px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.9)",
        }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: "50%", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: "1px", background: "rgba(201,168,76,0.5)", transform: "translateY(-50%)" }} />
            <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: "1px", background: "rgba(201,168,76,0.5)", transform: "translateX(-50%)" }} />
          </div>
          <div style={{ position: "absolute", bottom: "-22px", left: "50%", transform: "translateX(-50%)", fontFamily: "'Courier New',monospace", fontSize: "10px", color: "#c9a84c", background: "rgba(0,0,0,0.7)", padding: "2px 8px", borderRadius: "10px", whiteSpace: "nowrap" }}>{lensZoom}×</div>
        </div>
      )}
    </div>
  );
}


// ─── GEO FALLBACK — when GPS is blocked ──────────────────────────────────────
function GeoFallback({ enigma, adminPassword, onUnlock, onRetry }) {
  const [mode, setMode] = useState("menu"); // menu | coords | code
  const [userLat, setUserLat] = useState("");
  const [userLng, setUserLng] = useState("");
  const [unlockCode, setUnlockCode] = useState("");
  const [coordErr, setCoordErr] = useState("");
  const [codeErr, setCodeErr] = useState("");

  const targetLat = parseFloat(enigma.lat);
  const targetLng = parseFloat(enigma.lng);

  const checkCoords = () => {
    const lat = parseFloat(userLat.replace(",", "."));
    const lng = parseFloat(userLng.replace(",", "."));
    if (isNaN(lat) || isNaN(lng)) {
      setCoordErr("Inserisci coordinate valide (es. 45.4654)");
      return;
    }
    const d = haversine(lat, lng, targetLat, targetLng);
    if (d <= GEO_RADIUS) {
      onUnlock();
    } else {
      setCoordErr(`Sei a ${Math.round(d)}m dalla destinazione. Non sei ancora abbastanza vicino (raggio: ${GEO_RADIUS}m).`);
    }
  };

  const checkCode = () => {
    // Unlock code = last 4 digits of enigma answer reversed, or adminPassword
    const answerCode = (enigma.answer || "").slice(-4).split("").reverse().join("");
    if (unlockCode === adminPassword || unlockCode === answerCode) {
      onUnlock();
    } else {
      setCodeErr("Codice non valido. Chiedi all'amministratore.");
    }
  };

  return (
    <div style={{ ...styles.card, textAlign: "center" }}>
      <div style={{ fontSize: "40px", marginBottom: "12px" }}>📡</div>
      <h2 style={{ ...styles.title, fontSize: "20px", marginBottom: "8px" }}>GPS NON RILEVATO</h2>
      <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "12px", marginBottom: "20px", lineHeight: "1.7" }}>
        Il browser non ha accesso alla posizione.<br/>
        Scegli come procedere:
      </p>

      {mode === "menu" && (
        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          <button className="btn-gold" style={{ ...styles.btnPrimary, padding: "12px 20px" }} onClick={onRetry}>
            🔄 RIPROVA PERMESSO GPS
          </button>
          <button className="btn-outline" style={{ ...styles.btn, padding: "12px 20px" }} onClick={() => setMode("coords")}>
            📍 INSERISCI COORDINATE MANUALI
          </button>
          <button className="btn-outline" style={{ ...styles.btn, padding: "12px 20px" }} onClick={() => setMode("code")}>
            🔑 CODICE DI SBLOCCO ADMIN
          </button>
        </div>
      )}

      {mode === "coords" && (
        <div style={{ textAlign: "left" }}>
          <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "11px", marginBottom: "14px", textAlign: "center" }}>
            Apri Google Maps sul tuo telefono, vai sul punto indicato<br/>e inserisci qui le coordinate che vedi
          </p>
          <a
            href={`https://maps.google.com/?q=${enigma.lat},${enigma.lng}`}
            target="_blank" rel="noopener noreferrer"
            style={{ ...styles.tag, display: "block", textAlign: "center", marginBottom: "16px", color: G.gold, textDecoration: "none" }}
          >
            🗺 Apri destinazione su Google Maps
          </a>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
            <Input label="La tua Latitudine" value={userLat} onChange={v => { setUserLat(v); setCoordErr(""); }} placeholder="es. 45.4654" />
            <Input label="La tua Longitudine" value={userLng} onChange={v => { setUserLng(v); setCoordErr(""); }} placeholder="es. 9.1859" />
          </div>
          {coordErr && <p style={{ color: G.red, fontFamily: G.fontMono, fontSize: "12px", marginBottom: "10px" }}>{coordErr}</p>}
          <div style={{ display: "flex", gap: "10px" }}>
            <button className="btn-outline" style={{ ...styles.btn, flex: 1 }} onClick={() => setMode("menu")}>← Indietro</button>
            <button className="btn-gold" style={{ ...styles.btnPrimary, flex: 2 }} onClick={checkCoords}>VERIFICA POSIZIONE</button>
          </div>
        </div>
      )}

      {mode === "code" && (
        <div style={{ textAlign: "left" }}>
          <p style={{ color: G.muted, fontFamily: G.fontMono, fontSize: "11px", marginBottom: "14px", textAlign: "center" }}>
            Chiedi all'amministratore il codice di sblocco per questo enigma
          </p>
          <Input label="Codice di sblocco" value={unlockCode} onChange={v => { setUnlockCode(v); setCodeErr(""); }} placeholder="••••" />
          {codeErr && <p style={{ color: G.red, fontFamily: G.fontMono, fontSize: "12px", marginBottom: "10px" }}>{codeErr}</p>}
          <div style={{ display: "flex", gap: "10px" }}>
            <button className="btn-outline" style={{ ...styles.btn, flex: 1 }} onClick={() => setMode("menu")}>← Indietro</button>
            <button className="btn-gold" style={{ ...styles.btnPrimary, flex: 2 }} onClick={checkCode}>SBLOCCA</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VICTORY SCREEN ──────────────────────────────────────────────────────────
function VictoryScreen({ playerName, gameName, totalScore, maxScore, clientLogo, onComplete }) {
  const canvasRef   = useRef(null);
  const animRef     = useRef(null);
  const [phase, setPhase] = useState(0);
  // phase: 0=black | 1=planet-dawn | 2=logo | 3=title | 4=msg | 5=score | 6=cta

  // ── Planet images: curated Unsplash URLs (no auth needed) ─────────────────
  const planetImgs = [
    "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=1200&q=80", // Earth from space blue
    "https://images.unsplash.com/photo-1446776899648-aa78eefe8ed0?w=1200&q=80", // Sunrise over clouds
    "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80", // Mountain dawn
    "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1200&q=80", // Green forest light
  ];
  const [imgIdx, setImgIdx] = useState(0);
  const [imgLoaded, setImgLoaded] = useState(false);

  useEffect(() => {
    const timers = [
      setTimeout(() => setPhase(1), 500),
      setTimeout(() => setPhase(2), 3000),
      setTimeout(() => setPhase(3), 4500),
      setTimeout(() => setPhase(4), 6000),
      setTimeout(() => setPhase(5), 7800),
      setTimeout(() => setPhase(6), 9500),
    ];
    // Cycle planet images every 3.5s
    const imgInterval = setInterval(() => setImgIdx(i => (i + 1) % planetImgs.length), 3500);
    return () => { timers.forEach(clearTimeout); clearInterval(imgInterval); };
  }, []);

  // ── Cinematic music: emotional orchestral swell ────────────────────────────
  const { muted: globalMuted } = useMute();
  useEffect(() => {
    if (globalMuted) return;
    let ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Master chain: compressor → gain → destination
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 10;
      comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.25;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0, ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 3.5);
      master.gain.setValueAtTime(0.22, ctx.currentTime + 10);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 14.5);
      comp.connect(master); master.connect(ctx.destination);

      // Reverb
      const rev = ctx.createConvolver();
      const irL = ctx.sampleRate * 4;
      const ir  = ctx.createBuffer(2, irL, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = ir.getChannelData(ch);
        for (let i = 0; i < irL; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/irL, 1.8);
      }
      rev.buffer = ir;
      const revG = ctx.createGain(); revG.gain.value = 0.55;
      const dryG = ctx.createGain(); dryG.gain.value = 0.65;
      rev.connect(revG); revG.connect(comp); dryG.connect(comp);

      const send = (node) => { node.connect(dryG); node.connect(rev); };

      // ── Helper ──
      const osc = (freq, start, dur, vol, type="sine", atk=0.08, rel=0.6) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(0, ctx.currentTime + start);
        g.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + atk);
        g.gain.setValueAtTime(vol, ctx.currentTime + start + dur - rel);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
        o.connect(g); send(g);
        o.start(ctx.currentTime + start);
        o.stop(ctx.currentTime + start + dur + 0.1);
      };

      // ── Soft string pad: Am → F → C → G → Am → F → C → E (emotional) ──
      // Chord roots + fifths + thirds, sine pads, very soft
      const pad = (freqs, t, dur, vol=0.07) =>
        freqs.forEach(f => osc(f, t, dur, vol, "sine", 0.4, 0.9));

      // Am  F   C   G   Am  F   C   E
      pad([220, 330, 440], 0.5, 2.8);        // Am
      pad([174.6, 261.6, 349.2], 3.2, 2.8);  // F
      pad([261.6, 392, 523.3], 5.9, 2.8);    // C
      pad([196, 294, 392], 8.6, 2.8);        // G
      pad([220, 330, 440], 11.3, 3.5);       // Am resolve

      // ── Cello melody (triangle — warm) ──
      // Slow emotional line over the chords
      const mel = [
        [440,0.5,1.8,0.14],[392,2.3,1.4,0.14],[349.2,3.7,1.6,0.14],
        [440,5.3,1.0,0.14],[392,6.3,0.8,0.14],[349.2,7.1,1.5,0.14],
        [329.6,8.6,1.4,0.14],[293.7,10.0,1.2,0.14],
        [261.6,11.2,0.8,0.14],[293.7,12.0,0.6,0.14],
        [329.6,12.6,0.6,0.14],[349.2,13.2,1.8,0.14],
      ];
      mel.forEach(([f,t,d,v]) => osc(f, t, d, v, "triangle", 0.12, 0.5));

      // ── High shimmer (sine overtones — like distant bells) ──
      [[880,1.2,4,0.04],[1108,2.5,3.5,0.03],[1318,4.5,4,0.03],
       [880,7,5,0.04],[1046,9,5,0.03],[880,11,4,0.05]].forEach(
        ([f,t,d,v]) => osc(f, t, d, v, "sine", 0.01, 1.5));

      // ── Soft bass pulse (sub, sine) ──
      [[110,1,2.5,0.12],[87.3,3.5,2.5,0.1],[130.8,6,2.5,0.1],
       [98,8.5,2.5,0.1],[110,11,4,0.14]].forEach(
        ([f,t,d,v]) => osc(f, t, d, v, "sine", 0.2, 0.8));

      // ── Climax swell at t=7 ──
      [[523.3,7.5,5,0.09,"sine"],[659.3,7.5,5,0.07,"sine"],
       [783.9,7.5,5,0.05,"sine"],[1046.5,7.5,5,0.04,"sine"]].forEach(
        ([f,t,d,v,tp]) => osc(f, t, d, v, tp, 1.2, 2.0));

    } catch(e) {}
    return () => { try { ctx?.close(); } catch {} };
  }, []);

  // ── Particle canvas (golden light rays + fireflies) ───────────────────────
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const cx = cv.getContext("2d");
    const resize = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
    resize(); window.addEventListener("resize", resize);

    // Light rays from top
    const rays = Array.from({length: 12}, (_, i) => ({
      angle: (i / 12) * Math.PI - Math.PI/2 + (Math.random()-0.5)*0.3,
      width: Math.random() * 60 + 20,
      alpha: Math.random() * 0.07 + 0.02,
      speed: Math.random() * 0.002 + 0.001,
      phase: Math.random() * Math.PI * 2,
    }));

    // Floating particles (dust / hope)
    const pts = Array.from({length: 120}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vy: -(Math.random() * 0.8 + 0.2),
      vx: (Math.random()-0.5) * 0.3,
      r:  Math.random() * 3 + 0.5,
      alpha: Math.random() * 0.6 + 0.2,
      color: Math.random() > 0.5 ? "#c9a84c" : "#e8e0d0",
    }));

    let t = 0;
    const draw = () => {
      cx.clearRect(0, 0, cv.width, cv.height);
      const cx2 = cv.width/2, cy2 = cv.height * 0.4;

      // Rays
      rays.forEach(r => {
        const a = r.alpha * (0.6 + 0.4 * Math.sin(t * r.speed + r.phase));
        const grd = cx.createLinearGradient(cx2, cy2, cx2 + Math.cos(r.angle)*cv.height, cy2 + Math.sin(r.angle)*cv.height);
        grd.addColorStop(0, `rgba(201,168,76,${a})`);
        grd.addColorStop(1, "transparent");
        cx.save(); cx.beginPath();
        cx.moveTo(cx2, cy2);
        const hw = r.width / 2;
        cx.lineTo(cx2 + Math.cos(r.angle - hw*0.01)*cv.height, cy2 + Math.sin(r.angle - hw*0.01)*cv.height);
        cx.lineTo(cx2 + Math.cos(r.angle + hw*0.01)*cv.height, cy2 + Math.sin(r.angle + hw*0.01)*cv.height);
        cx.closePath(); cx.fillStyle = grd; cx.fill(); cx.restore();
      });

      // Particles
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -10) { p.y = cv.height + 5; p.x = Math.random()*cv.width; }
        cx.save(); cx.globalAlpha = p.alpha * (0.5 + 0.5 * Math.sin(t*0.03 + p.x));
        cx.fillStyle = p.color; cx.shadowColor = p.color; cx.shadowBlur = 6;
        cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2); cx.fill(); cx.restore();
      });
      t++; animRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener("resize", resize); };
  }, []);

  const pct   = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;
  const medal = pct >= 80 ? "🥇" : pct >= 50 ? "🥈" : "🥉";
  const rank  = pct >= 80 ? "ÉLITE" : pct >= 50 ? "AGENTE" : "RECLUTA";
  const msg   = pct >= 80
    ? "Avete fermato NEXUS. Il pianeta si risveglia. L'umanità vi deve la vita."
    : pct >= 50
    ? "Il protocollo è stato neutralizzato. La Terra respira di nuovo."
    : "NEXUS è silenzioso. Un nuovo alba sorge sull'orizzonte.";

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9000, background: "#000", overflow: "hidden" }}>

      {/* ── Planet background image ── */}
      {phase >= 1 && (
        <div style={{ position: "absolute", inset: 0, zIndex: 0, transition: "opacity 1.5s ease", opacity: imgLoaded ? 1 : 0 }}>
          <img
            key={imgIdx}
            src={planetImgs[imgIdx]}
            onLoad={() => setImgLoaded(true)}
            onError={() => setImgLoaded(true)}
            alt=""
            style={{
              width: "100%", height: "100%", objectFit: "cover",
              filter: "brightness(0.28) saturate(1.2) hue-rotate(10deg)",
              animation: "cin-kenburns 7s ease-out forwards",
            }}
          />
          {/* Dark vignette */}
          <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 40%, transparent 20%, rgba(0,0,0,0.75) 100%)" }} />
          {/* Warm dawn glow at bottom */}
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "40%", background: "linear-gradient(to top, rgba(201,120,30,0.18), transparent)" }} />
        </div>
      )}

      {/* ── Particle canvas ── */}
      <canvas ref={canvasRef} style={{ position: "absolute", inset: 0, zIndex: 1, pointerEvents: "none" }} />

      {/* ── Horizontal light separator ── */}
      <div style={{ position: "absolute", top: "42%", left: 0, right: 0, height: "1px", zIndex: 2,
        background: "linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent)",
        opacity: phase >= 2 ? 1 : 0, transition: "opacity 1s ease",
      }} />

      {/* ── Main content ── */}
      <div style={{
        position: "relative", zIndex: 3,
        height: "100%", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        padding: "40px 24px", textAlign: "center",
      }}>

        {/* Client logo */}
        {phase >= 2 && clientLogo && (
          <div style={{ marginBottom: "20px", animation: "fadeInUp 1s ease both" }}>
            <img src={clientLogo} alt="logo" style={{
              maxHeight: "60px", maxWidth: "180px", objectFit: "contain",
              filter: "brightness(1.1) drop-shadow(0 0 12px rgba(201,168,76,0.4))",
            }} />
          </div>
        )}

        {/* Status line */}
        {phase >= 2 && (
          <div style={{ animation: "fadeInUp 0.7s ease both", fontFamily: "'Courier New',monospace",
            fontSize: "10px", letterSpacing: "6px", color: "#c0392b", marginBottom: "18px" }}>
            ▶ NEXUS NEUTRALIZZATO — IL PIANETA SI RISVEGLIA ◀
          </div>
        )}

        {/* Medal + title */}
        {phase >= 3 && (
          <div style={{ animation: "fadeInUp 0.8s ease both" }}>
            <div style={{ fontSize: "clamp(3.5rem,12vw,7rem)", marginBottom: "10px",
              filter: "drop-shadow(0 0 24px rgba(201,168,76,0.9))",
              animation: "pulse-gold 2.5s ease infinite" }}>
              {medal}
            </div>
            <h1 style={{
              fontFamily: "'Playfair Display',Georgia,serif",
              fontSize: "clamp(1.8rem,6vw,3.5rem)",
              fontWeight: 900, color: "#fff", letterSpacing: "5px", margin: "0 0 8px",
              textShadow: "0 0 50px rgba(201,168,76,0.6), 0 0 100px rgba(201,168,76,0.25)",
            }}>
              MISSIONE COMPLETATA
            </h1>
            <div style={{ fontFamily: "'Courier New',monospace", fontSize: "12px",
              letterSpacing: "5px", color: G.gold }}>
              CLASSIFICAZIONE: {rank}
            </div>
          </div>
        )}

        {phase >= 6 && (

      <style>{`

// ─── PLAYER GAME VIEW ─────────────────────────────────────────────────────────
const GEO_RADIUS = 30; // metres — realistic for smartphone GPS accuracy


// ─── ENIGMA TIMER (6 min hourglass) ─────────────────────────────────────────
const ENIGMA_DURATION = 6 * 60; // 360 seconds

function EnigmaTimer({ startTime, onExpired }) {
  const [elapsed, setElapsed] = useState(() => Math.floor((Date.now() - startTime) / 1000));
  const [expired, setExpired] = useState(false);
  const expiredFiredRef = useRef(false);

  useEffect(() => {
    const iv = setInterval(() => {
      const e = Math.floor((Date.now() - startTime) / 1000);
      setElapsed(e);
      if (e >= ENIGMA_DURATION && !expiredFiredRef.current) {
        expiredFiredRef.current = true;
        setExpired(true);
        onExpired();
      }
    }, 500);
    return () => clearInterval(iv);
  }, [startTime]);

  const remaining = Math.max(0, ENIGMA_DURATION - elapsed);
  const pct       = Math.min(1, elapsed / ENIGMA_DURATION); // 0→1 as time passes
  const mins      = Math.floor(remaining / 60);
  const secs      = remaining % 60;
  const isWarning = remaining <= 60 && !expired;
  const color     = expired ? "#c0392b" : isWarning ? "#e0a020" : "#c9a84c";

  // SVG hourglass sand fill: top half empties, bottom fills
  const sandTop    = Math.max(0, (1 - pct) * 28);      // px height of sand in top
  const sandBottom = Math.min(28, pct * 28);            // px height of sand in bottom
  const topY       = 10 + (28 - sandTop);               // y position of top sand rect
  const botY       = 38 + (28 - sandBottom);            // y position of bottom sand rect

  return (
    <div style={{ display: "flex", alignItems: "center", gap: "10px",
      background: expired ? "rgba(192,57,43,0.1)" : "rgba(0,0,0,0.4)",
      border: `1px solid ${expired ? "rgba(192,57,43,0.5)" : isWarning ? "rgba(224,160,32,0.5)" : "rgba(201,168,76,0.25)"}`,
      borderRadius: "8px", padding: "8px 14px",
      animation: isWarning ? "flicker 0.6s ease infinite" : undefined,
    }}>
      {/* SVG Hourglass */}
      <svg width="28" height="44" viewBox="0 0 28 66" fill="none" xmlns="http://www.w3.org/2000/svg"
        style={{ flexShrink: 0, filter: expired ? "drop-shadow(0 0 6px rgba(192,57,43,0.8))" : undefined }}>
        {/* Frame */}
        <polygon points="2,2 26,2 14,33" fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
        <polygon points="2,64 26,64 14,33" fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
        <line x1="0" y1="2" x2="28" y2="2" stroke={color} strokeWidth="2.5"/>
        <line x1="0" y1="64" x2="28" y2="64" stroke={color} strokeWidth="2.5"/>
        {/* Top sand (clipped to upper triangle) */}
        <clipPath id="clip-top">
          <polygon points="3,3 25,3 14,32"/>
        </clipPath>
        <rect x="3" y={topY} width="22" height={sandTop} fill={color} opacity="0.7" clipPath="url(#clip-top)"/>
        {/* Drip particle */}
        {!expired && pct > 0 && pct < 1 && (
          <circle cx="14" cy="33" r="1.5" fill={color} opacity="0.9">
            <animate attributeName="cy" values="30;36;30" dur="1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1s" repeatCount="indefinite"/>
          </circle>
        )}
        {/* Bottom sand (clipped to lower triangle) */}
        <clipPath id="clip-bot">
          <polygon points="3,63 25,63 14,34"/>
        </clipPath>
        <rect x="3" y={botY} width="22" height={sandBottom} fill={color} opacity="0.7" clipPath="url(#clip-bot)"/>
      </svg>

      {/* Time display */}
      <div>
        {expired ? (
          <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: "#c0392b", letterSpacing: "1px", lineHeight: 1.4 }}>
            <div style={{ fontWeight: "bold" }}>TEMPO SCADUTO</div>
            <div style={{ opacity: 0.7, fontSize: "10px" }}>-3 punti handicap</div>
          </div>
        ) : (
          <div style={{ fontFamily: G.fontMono, fontSize: "18px", fontWeight: "bold", color, letterSpacing: "2px", lineHeight: 1 }}>
            {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
            <div style={{ fontSize: "9px", color: G.muted, letterSpacing: "2px", marginTop: "2px" }}>RIMASTI</div>
          </div>
        )}
      </div>
    </div>
  );
}

// Calculate score for an enigma (1-10 based on time, -3 penalty if expired)
function calcEnigmaScore(elapsedSeconds, expired) {
  // 10 pts if solved instantly, 1 pt if took full 6 min or more
  const raw = Math.max(1, Math.round(10 - (elapsedSeconds / ENIGMA_DURATION) * 9));
  return expired ? Math.max(0, raw - 3) : raw;
}

function PlayerGameView({ game, onBack }) {
  // game may have _playerName and _playerCode injected at login
  const playerName = game._playerName || "Giocatore";
  const playerCode = game._playerCode || "?";
  const [phase, setPhase] = useState("cinematic"); // cinematic | intro | enigma | post | complete
  const [victoryDone, setVictoryDone] = useState(false); // has victory screen been dismissed
  const [enigmaIdx, setEnigmaIdx] = useState(0);
  const [answer, setAnswer] = useState("");
  const [error, setError] = useState("");
  const [geoStatus, setGeoStatus] = useState("idle"); // idle | checking | near | far | nocoords | error
  const [distance, setDistance] = useState(null);
  const [agentOpen, setAgentOpen] = useState(false);
  // ── Timer & score ──────────────────────────────────────────────────────────
  const [enigmaStartTime, setEnigmaStartTime] = useState(null); // ms timestamp when enigma unlocked
  const [timerExpired,    setTimerExpired]    = useState(false);
  const [scores,          setScores]          = useState([]); // per-enigma: {idx, score, elapsed, expired}
  const totalScore = scores.reduce((s, e) => s + e.score, 0);
  // ── AgentX conversation log ───────────────────────────────────────────────
  const [agentXLog, setAgentXLog] = useState([]); // {text, enigmaTitle, ts}
  const handleAgentXMessage = async (entry) => {
    const newLog = [...agentXLog, entry];
    setAgentXLog(newLog);
    // Persist log to storage
    const key = `agentlog:${game.id}:${playerCode}`;
    try {
      await window.storage.set(key, JSON.stringify({
        playerCode, playerName, gameId: game.id, gameName: game.name,
        log: newLog, updatedAt: new Date().toISOString(),
      }));
    } catch {}
  };

  // Use a ref for "unlocked" so watchPosition callback always sees current value
  const unlockedRef = useRef(false);
  const [unlockedState, setUnlockedState] = useState(false); // mirrors ref for rendering
  const watchIdRef = useRef(null);
  const pollRef = useRef(null);

  const enigma = game.enigmas[enigmaIdx];
  const isLast = enigmaIdx === game.enigmas.length - 1;

  // Parse coords for current enigma
  const getCoords = () => {
    if (!enigma?.lat || !enigma?.lng) return null;
    const lat = parseFloat(enigma.lat);
    const lng = parseFloat(enigma.lng);
    if (isNaN(lat) || isNaN(lng)) return null;
    return { lat, lng };
  };

  // Stop all geo watchers
  const stopGeo = () => {
    if (watchIdRef.current !== null) {
      try { navigator.geolocation.clearWatch(watchIdRef.current); } catch {}
      watchIdRef.current = null;
    }
    if (pollRef.current !== null) {
      clearInterval(pollRef.current);
      pollRef.current = null;
    }
  };

  // Called on every position update
  const onPosition = useCallback((pos) => {
    const coords = getCoords();
    if (!coords) return;
    const d = haversine(pos.coords.latitude, pos.coords.longitude, coords.lat, coords.lng);
    const dm = Math.round(d);
    setDistance(dm);

    if (dm <= GEO_RADIUS) {
      // Unlock and keep unlocked
      if (!unlockedRef.current) {
        unlockedRef.current = true;
        setUnlockedState(true);
        setGeoStatus("near");
        setEnigmaStartTime(Date.now());
        setTimerExpired(false);
      }
    } else {
      if (!unlockedRef.current) {
        setGeoStatus("far");
      }
    }
  }, [enigmaIdx]);

  // Start geolocation for current enigma
  const startGeo = useCallback(() => {
    stopGeo();
    const coords = getCoords();

    if (!coords) {
      setGeoStatus("nocoords");
      unlockedRef.current = true; // no coords = freely accessible
      setUnlockedState(true);
      return;
    }

    if (!navigator.geolocation) {
      setGeoStatus("error");
      return;
    }

    setGeoStatus("checking");
    setDistance(null);

    // Pre-check permission state if available
    if (navigator.permissions) {
      navigator.permissions.query({ name: "geolocation" }).then(result => {
        if (result.state === "denied") {
          setGeoStatus("error");
        }
      }).catch(() => {});
    }

    const onError = (err) => {
      console.warn("Geo error:", err.code, err.message);
      setGeoStatus("error");
    };

    // Primary: watchPosition for live updates
    try {
      watchIdRef.current = navigator.geolocation.watchPosition(
        onPosition,
        onError,
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    } catch (e) {
      setGeoStatus("error");
    }

    // Fallback polling every 10s in case watchPosition stalls (common on some Android)
    pollRef.current = setInterval(() => {
      if (unlockedRef.current) { clearInterval(pollRef.current); return; }
      try {
        navigator.geolocation.getCurrentPosition(
          onPosition,
          () => {},
          { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
      } catch {}
    }, 10000);

  }, [enigmaIdx, onPosition]);

  // Start geo when entering enigma phase or changing enigma
  useEffect(() => {
    if (phase !== "enigma") { stopGeo(); return; }

    const coords = getCoords();

    // No GPS coordinates configured for this enigma — unlock immediately, skip GPS entirely
    if (!coords) {
      unlockedRef.current = true;
      setUnlockedState(true);
      setGeoStatus("nocoords");
      setDistance(null);
      setEnigmaStartTime(Date.now());
      setTimerExpired(false);
      return;
    }

    // GPS coordinates present — reset state and start tracking
    unlockedRef.current = false;
    setUnlockedState(false);
    setGeoStatus("idle");
    setDistance(null);

    startGeo();
    return () => stopGeo();
  }, [phase, enigmaIdx]);

  const checkAnswer = async () => {
    if (answer.trim().toLowerCase() === (enigma.answer || "").trim().toLowerCase()) {
      // Calculate score
      const elapsed = enigmaStartTime ? Math.floor((Date.now() - enigmaStartTime) / 1000) : ENIGMA_DURATION;
      const score   = calcEnigmaScore(elapsed, timerExpired);
      const entry   = { idx: enigmaIdx, title: enigma.title || `Enigma ${enigmaIdx + 1}`, score, elapsed, expired: timerExpired };
      const newScores = [...scores, entry];
      setScores(newScores);

      // Persist scores to storage keyed by playerCode + gameId
      const storageKey = `scores:${game.id}:${playerCode}`;
      try {
        await window.storage.set(storageKey, JSON.stringify({
          playerCode, playerName,
          gameId: game.id, gameName: game.name,
          scores: newScores,
          total: newScores.reduce((s, e) => s + e.score, 0),
          completedAt: new Date().toISOString(),
        }));
      } catch {}

      setPhase("post");
      setError("");
    } else {
      setError("Risposta errata. Continua a cercare…");
    }
  };

  const nextEnigma = () => {
    if (isLast) { setPhase("complete"); }
    else {
      setEnigmaIdx((i) => i + 1);
      setPhase("enigma");
      setAnswer(""); setError("");
      setEnigmaStartTime(null); setTimerExpired(false);
    }
  };

  const renderLinks = (links) => {
    if (!links) return null;
    return links.split("\n").filter(Boolean).map((l, i) => (
      <a key={i} href={l} target="_blank" rel="noopener noreferrer" style={{ display: "block", color: G.gold, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "6px", wordBreak: "break-all" }}>{l}</a>

  const [lightbox, setLightbox] = useState(null); // {src, name, type}

  const renderFiles = (files) => {
    if (!files?.length) return null;

    // Separate 360° images from regular files
    const imgs360   = files.filter(f => f.type.startsWith("image/") && is360Image(f));
    const regular   = files.filter(f => !(f.type.startsWith("image/") && is360Image(f)));

    return (
      <>
        {/* ── 360° Panorama viewers ── */}
        {imgs360.map((f, i) => (
          <div key={`pano-${i}`} style={{ width: "100%", marginBottom: "20px" }}>
            {/* Header bar */}
            <div style={{
              display: "flex", alignItems: "center", gap: "10px",
              marginBottom: "0",
              background: "rgba(0,0,0,0.55)",
              border: "1px solid rgba(201,168,76,0.25)",
              borderBottom: "none",
              borderRadius: "8px 8px 0 0",
              padding: "8px 14px",
            }}>
              <span style={{ fontFamily: G.fontMono, fontSize: "10px", color: "#c9a84c", letterSpacing: "2px" }}>🌐 PANORAMA 360°</span>
              <span style={{ fontFamily: G.fontMono, fontSize: "10px", color: "rgba(255,255,255,0.3)", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
              <button
                onClick={() => setLightbox(f)}
                style={{
                  fontFamily: G.fontMono, fontSize: "10px", color: "#c9a84c",
                  background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.3)",
                  borderRadius: "4px", padding: "3px 12px", cursor: "pointer", letterSpacing: "1px",
                  flexShrink: 0,
                }}
              >⛶ schermo intero</button>
            </div>
            {/* Viewer */}
            <div style={{ borderRadius: "0 0 8px 8px", overflow: "hidden", border: "1px solid rgba(201,168,76,0.25)", borderTop: "none" }}>
              <Panorama360Viewer src={f.data} compact={true} />
            </div>
          </div>
        ))}

        {/* ── Regular files ── */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: "12px", marginBottom: "20px" }}>
          {regular.map((f, i) => {
            if (f.type.startsWith("image/")) return (
