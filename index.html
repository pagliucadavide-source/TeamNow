// ─── Haversine distance (meters) ────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) *
      Math.cos((lat2 * Math.PI) / 180) *
      Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function ytId(url) {
  if (!url) return null;
  const m = url.match(
    /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/
  );
  return m ? m[1] : null;
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function isVideoFile(f) {
  if (!f) return false;
  if (f.type && f.type.startsWith("video/")) return true;
  if (f.name && /\.(mp4|mpeg|mpg|avi|mov|webm|m4v|mkv)$/i.test(f.name)) return true;
  if (f.data && typeof f.data === "string" && f.data.startsWith("data:video/")) return true;
  return false;
}

// Renders text with clickable links — splits on URLs and wraps them in <a>
function Linkify({ text, style = {} }) {
  if (!text) return null;
  const URL_RE = /(https?:\/\/[^\s\n]+)/g;
  const parts = text.split(URL_RE);
  return (
    <span style={{ whiteSpace: "pre-wrap", ...style }}>
      {parts.map((part, i) =>
        URL_RE.test(part) ? (
          <a
            key={i}
            href={part}
            target="_blank"
            rel="noopener noreferrer"
            onClick={e => e.stopPropagation()}
            style={{
              color: G.gold,
              textDecoration: "underline",
              textUnderlineOffset: "3px",
              wordBreak: "break-all",
              cursor: "pointer",
            }}
          >
            {part}
          </a>
        ) : (
          <span key={i}>{part}</span>
        )
      )}
    </span>
  );
}

// Helper: get all players of a game (backwards-compatible with old .code field)
function getGamePlayers(game) {
  if (game.players && game.players.length > 0) return game.players;
  // Legacy: single code on game itself
  return [{ id: game.id + "_p1", name: "Giocatore 1", code: game.code || "" }];
}

// Find game+player by access code across all games
function findGameByCode(games, code) {
  const trimmed = code.trim();
  for (const game of games) {
    const players = getGamePlayers(game);
    const player = players.find(p => p.code === trimmed);
    if (player) return { game, player };
    // Legacy fallback
    if (game.code === trimmed) return { game, player: { id: "p1", name: "Giocatore 1", code: game.code } };
  }
  return null;
}

// ─── Reusable Input ──────────────────────────────────────────────────────────
function Input({ label, value, onChange, type = "text", placeholder, rows, style = {}, onEnter }) {
  const [focused, setFocused] = useState(false);
  const inputStyle = { ...styles.input, ...(focused ? styles.inputFocus : {}), ...style };
  return (
    <div style={{ marginBottom: "16px" }}>
      {label && <label style={styles.label}>{label}</label>}
      {rows ? (
        <textarea
          style={{ ...inputStyle, resize: "vertical", minHeight: `${rows * 24}px` }}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
        />
      ) : (
        <input
          type={type}
          style={inputStyle}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && onEnter && onEnter()}
          placeholder={placeholder}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
        />
      )}
    </div>
  );
}

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    const observer = new ResizeObserver(resize);
    observer.observe(canvas);

    const cols = Math.floor(canvas.width / 18);
    const drops = Array.from({ length: cols }, () => Math.random() * -80);
    const chars = "01アイウエオカキクケコ∑∆∏∫√≠≤≥REVOLT∞";
    let frame = 0;

    const draw = () => {
      frame++;
      ctx.fillStyle = "rgba(10,10,15,0.18)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const isRed = Math.random() > 0.85;
        const alpha = 0.12 + Math.random() * 0.25;

        // Head glow
        ctx.font = `bold 14px 'Courier New', monospace`;
        ctx.fillStyle = isRed ? `rgba(192,57,43,${alpha + 0.5})` : `rgba(201,168,76,${alpha})`;
        ctx.shadowBlur = isRed ? 12 : 0;
        ctx.shadowColor = "#c0392b";
        ctx.fillText(char, i * 18, y * 18);
        ctx.shadowBlur = 0;

        drops[i] = y > canvas.height / 18 + Math.random() * 20 ? 0 : y + 0.4;
      });
      raf = requestAnimationFrame(draw);
    };
    draw();

// ─── ADMIN LOGIN ─────────────────────────────────────────────────────────────
function AdminLogin({ adminPassword, onSuccess, onBack }) {
  const [pwd, setPwd] = useState("");
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);
  const handle = () => {
    if (pwd === adminPassword) { onSuccess(); }
    else {
      setError("Codice di accesso non valido");
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
      <div style={{ ...styles.card, maxWidth: "400px", width: "100%", textAlign: "center", animation: shake ? "none" : "fadeInUp 0.5s ease" }}>
        <div style={{ fontSize: "48px", marginBottom: "16px" }}>🔐</div>
        <h2 style={{ ...styles.title, fontSize: "24px", marginBottom: "8px" }}>ACCESSO RISERVATO</h2>
        <p style={{ color: G.muted, marginBottom: "28px", fontFamily: G.fontMono, fontSize: "13px" }}>Pannello Amministratore</p>
        <Input label="Password" type="password" value={pwd} onChange={setPwd} placeholder="••••••••" />
        {error && <p style={{ color: G.red, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "16px" }}>{error}</p>}
        <div style={{ display: "flex", gap: "12px", justifyContent: "center" }}>
          <button className="btn-outline" style={styles.btn} onClick={onBack}>← Indietro</button>
          <button className="btn-gold" style={styles.btnPrimary} onClick={handle}>Accedi</button>
        </div>
      </div>
    </div>
  );
}

  const handleFile = (e) => {
    const files = Array.from(e.target.files);
    Promise.all(
      files.map(
        (f) =>
          new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = () => res({
              name: f.name,
              type: f.type || "application/octet-stream",
              data: reader.result,
              is360: /360|panoram|equirect|pano|sphere|vr_|_vr|photo.?sphere/i.test(f.name),

// ─── VIDEO ENIGMA PLAYER ──────────────────────────────────────────────────────
function VideoEnigmaPlayer({ enigma, playerName, gameName, onComplete }) {
  const { muted } = React.useContext(MuteContext);
  const [phase, setPhase]           = useState("camera");  // camera|recording|processing|result
  const [elapsed, setElapsed]       = useState(0);
  const [evaluation, setEvaluation] = useState(null);
  const [evalError, setEvalError]   = useState(null);
  const [stream, setStream]         = useState(null);
  const [camError, setCamError]     = useState(null);
  const videoRef    = useRef(null);
  const recorderRef = useRef(null);
  const chunksRef   = useRef([]);
  const timerRef    = useRef(null);
  const maxSec      = enigma.recordingSeconds || 120;

  // Open camera immediately on mount
  useEffect(() => {
    let active = true;
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(s => {
        if (!active) { s.getTracks().forEach(t => t.stop()); return; }
        setStream(s);
      })
      .catch(e => setCamError("Webcam non disponibile: " + e.message));
    return () => {
      active = false;
    };
  }, []);

  // Attach stream to video element whenever stream or phase changes
  useEffect(() => {
    if (videoRef.current && stream) {
      videoRef.current.srcObject = stream;
    }
  }, [stream, phase]);

  // Stop stream on unmount
  useEffect(() => {
    return () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      clearInterval(timerRef.current);
    };
  }, [stream]);

  const fmtTime = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const pct = Math.min(100, Math.round((elapsed / maxSec) * 100));

  const startRecording = () => {
    if (!stream) return;
    chunksRef.current = [];
    const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp9")
      ? "video/webm;codecs=vp9" : "video/webm";
    const rec = new MediaRecorder(stream, { mimeType });
    rec.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
    rec.start(500);
    recorderRef.current = rec;
    setElapsed(0);
    setPhase("recording");
    timerRef.current = setInterval(() => {
      setElapsed(prev => {
        const next = prev + 1;
        if (next >= maxSec) { stopRecording(); }
        return next;
      });
    }, 1000);
  };

  const stopRecording = () => {
    clearInterval(timerRef.current);
    if (recorderRef.current && recorderRef.current.state !== "inactive") {
      recorderRef.current.stop();
    }
    if (stream) stream.getTracks().forEach(t => t.stop());
    setStream(null);
    setPhase("processing");
    setTimeout(() => evaluateWithAI(), 800);
  };

  const evaluateWithAI = async () => {
    const criteria = enigma.aiEvalCriteria
      ? "Criteri specifici: " + enigma.aiEvalCriteria + "."
      : "Valuta collaborazione, chiarezza comunicativa, creativita e approccio al problema.";
    const prompt = `Sei un valutatore esperto di team building e problem solving.
Il team "${gameName}" (giocatore: ${playerName}) ha completato una sfida video.

SFIDA: "${enigma.challenge || "Problem solving di gruppo"}"

${criteria}

Genera una valutazione formativa. Includi:
- Punti di Forza
- Aree di Miglioramento
- Consiglio per il Team
- VOTO COMPLESSIVO: X/10

Tono professionale e incoraggiante. 200-300 parole in italiano.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await res.json();
      const text = data.content && data.content[0] ? data.content[0].text : "";
      setEvaluation(text);
      if (!muted && text) {
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = "it-IT"; utt.rate = 0.95;
        window.speechSynthesis.speak(utt);
      }
    } catch(e) {
      setEvalError("Errore AI: " + e.message);
    }
    setPhase("result");
  };

  // ── camera + recording shared video preview ──
  const VideoPreview = ({ isRecording }) => (
    <div style={{ position: "relative", borderRadius: "8px", overflow: "hidden",
      border: isRecording ? "2px solid #c0392b" : "2px solid rgba(201,168,76,0.3)",
      marginBottom: "16px",
      boxShadow: isRecording ? "0 0 30px rgba(192,57,43,0.4)" : "0 0 20px rgba(0,0,0,0.5)",
      background: "#000", transition: "border-color 0.3s, box-shadow 0.3s",
    }}>
      {stream ? (
        <video ref={videoRef} autoPlay muted playsInline
          style={{ width: "100%", display: "block", maxHeight: "360px",
            objectFit: "cover", transform: "scaleX(-1)" }} />
      ) : (
        <div style={{ height: "240px", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", gap: "12px" }}>
          <div style={{ fontSize: "40px", animation: "spin 2s linear infinite", display: "inline-block" }}>⏳</div>
          <div style={{ fontFamily: G.fontMono, fontSize: "12px", color: G.muted }}>
            {camError || "Apertura webcam..."}
          </div>
        </div>
      )}
      {/* REC badge */}
      {isRecording && (
        <div style={{ position: "absolute", top: "12px", left: "12px",
          display: "flex", alignItems: "center", gap: "8px",
          background: "rgba(0,0,0,0.75)", borderRadius: "20px", padding: "5px 14px" }}>
          <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: "#c0392b",
            animation: "cin-blink 1s step-end infinite", display: "inline-block" }} />
          <span style={{ fontFamily: G.fontMono, fontSize: "12px", color: "#fff", letterSpacing: "2px" }}>REC</span>
        </div>
      )}
      {/* Live badge when camera on but not recording */}
      {!isRecording && stream && (
        <div style={{ position: "absolute", top: "12px", left: "12px",
          display: "flex", alignItems: "center", gap: "6px",
          background: "rgba(0,0,0,0.65)", borderRadius: "20px", padding: "4px 12px" }}>
          <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: "#2ecc71",
            animation: "cin-blink 2s step-end infinite", display: "inline-block" }} />
          <span style={{ fontFamily: G.fontMono, fontSize: "10px", color: "#fff", letterSpacing: "2px" }}>LIVE</span>
        </div>
      )}
      {/* Timer (recording only) */}
      {isRecording && (
        <div style={{ position: "absolute", top: "12px", right: "12px",
          fontFamily: G.fontMono, fontSize: "20px",
          color: elapsed > maxSec * 0.8 ? "#c0392b" : "#fff",
          background: "rgba(0,0,0,0.7)", borderRadius: "8px", padding: "4px 14px" }}>
          {fmtTime(maxSec - elapsed)}
        </div>
      )}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>

      {/* ── CAMERA PREVIEW (intro) ── */}
      {phase === "camera" && (
        <div>
          {/* Consegna */}
          {enigma.description ? (
            <div style={{ ...styles.card, marginBottom: "16px", border: "1px solid rgba(192,57,43,0.15)",
              fontFamily: "'Playfair Display',Georgia,serif", fontSize: "15px", lineHeight: "1.9", color: G.text }}>
              <Linkify text={enigma.description} />
            </div>
          ) : null}
          <div style={{ ...styles.card, border: "1px solid rgba(192,57,43,0.4)",
            background: "rgba(192,57,43,0.05)", marginBottom: "16px" }}>
            <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: "#c0392b",
              letterSpacing: "3px", marginBottom: "10px" }}>🎥 SFIDA VIDEO — CONSEGNA</div>
            <div style={{ fontSize: "16px", lineHeight: "1.8", color: G.text,
              fontFamily: "'Crimson Text',Georgia,serif" }}>
              <Linkify text={enigma.challenge || ""} />
            </div>
            <div style={{ marginTop: "12px", fontFamily: G.fontMono, fontSize: "11px",
              color: G.muted, display: "flex", gap: "16px" }}>
              <span>⏱ Max {fmtTime(maxSec)}</span>
              <span>🤖 Valutazione AI automatica</span>
            </div>
          </div>

          {/* Live preview */}
          <VideoPreview isRecording={false} />

          {camError && (
            <div style={{ ...styles.card, marginBottom: "12px", background: "rgba(192,57,43,0.08)",
              border: "1px solid rgba(192,57,43,0.3)", fontFamily: G.fontMono,
              fontSize: "12px", color: "#e8a0a0", textAlign: "center" }}>
              ⚠ {camError}
            </div>
          )}

          {/* Big REC button */}
          <button
            disabled={!stream}
            onClick={startRecording}
            style={{
              width: "100%", padding: "20px",
              background: stream ? "#c0392b" : "rgba(192,57,43,0.2)",
              border: "none", borderRadius: "8px", cursor: stream ? "pointer" : "not-allowed",
              display: "flex", alignItems: "center", justifyContent: "center", gap: "14px",
              boxShadow: stream ? "0 0 30px rgba(192,57,43,0.4)" : "none",
              transition: "all 0.2s",
            }}
            onMouseEnter={e => { if (stream) e.currentTarget.style.background = "#a93226"; }}
            onMouseLeave={e => { if (stream) e.currentTarget.style.background = "#c0392b"; }}
          >
            {/* Circle play icon */}
            <div style={{ width: "36px", height: "36px", borderRadius: "50%",
              border: "3px solid #fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div style={{ width: 0, height: 0,
                borderTop: "9px solid transparent", borderBottom: "9px solid transparent",
                borderLeft: "16px solid #fff", marginLeft: "3px" }} />
            </div>
            <span style={{ fontFamily: G.fontMono, fontSize: "16px", letterSpacing: "3px",
              color: "#fff", fontWeight: "bold" }}>
              {stream ? "AVVIA REGISTRAZIONE" : "APERTURA WEBCAM..."}
            </span>
          </button>
        </div>
      )}

      {/* ── RECORDING ── */}
      {phase === "recording" && (
        <div>
          <VideoPreview isRecording={true} />

          {/* Progress bar */}
          <div style={{ height: "5px", background: G.border, borderRadius: "3px",
            marginBottom: "16px", overflow: "hidden" }}>
            <div style={{ height: "100%", background: "#c0392b", borderRadius: "3px",
              width: pct + "%", transition: "width 1s linear" }} />
          </div>

          {/* Consegna reminder */}
          <div style={{ ...styles.card, background: "rgba(0,0,0,0.4)",
            border: "1px solid rgba(192,57,43,0.2)", marginBottom: "16px",
            fontSize: "14px", color: G.muted, lineHeight: "1.7" }}>
            <div style={{ fontFamily: G.fontMono, fontSize: "9px", color: "#c0392b",
              letterSpacing: "2px", marginBottom: "8px" }}>CONSEGNA</div>
            <Linkify text={enigma.challenge || ""} />
          </div>

          {/* Stop button */}
          <button onClick={stopRecording}
            style={{ width: "100%", padding: "16px", background: "rgba(192,57,43,0.15)",
              border: "2px solid #c0392b", borderRadius: "8px", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
              fontFamily: G.fontMono, fontSize: "14px", color: "#e8a0a0", letterSpacing: "2px",
              transition: "all 0.2s",
            }}
            onMouseEnter={e => { e.currentTarget.style.background = "rgba(192,57,43,0.3)"; }}
            onMouseLeave={e => { e.currentTarget.style.background = "rgba(192,57,43,0.15)"; }}
          >
            <div style={{ width: "20px", height: "20px", background: "#c0392b", borderRadius: "3px" }} />
            TERMINA REGISTRAZIONE
          </button>
        </div>
      )}

      {/* ── PROCESSING ── */}
      {phase === "processing" && (
        <div style={{ textAlign: "center", padding: "60px 20px" }}>
          <div style={{ fontSize: "48px", marginBottom: "20px",
            animation: "spin 2s linear infinite", display: "inline-block" }}>🤖</div>
          <div style={{ fontFamily: G.fontMono, fontSize: "13px", color: G.gold,
            letterSpacing: "3px", marginBottom: "8px" }}>ANALISI AI IN CORSO</div>
          <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.muted }}>
            Valutazione della performance del team...
          </div>
        </div>
      )}

      {/* ── RESULT ── */}
      {phase === "result" && (
        <div>
          {evalError ? (
            <div style={{ ...styles.card, border: "1px solid rgba(192,57,43,0.4)",
              background: "rgba(192,57,43,0.06)", textAlign: "center", padding: "24px" }}>
              <div style={{ fontSize: "36px", marginBottom: "12px" }}>⚠️</div>
              <div style={{ fontFamily: G.fontMono, fontSize: "12px", color: "#c0392b" }}>{evalError}</div>
            </div>
          ) : (
            <div>
              <div style={{ textAlign: "center", marginBottom: "20px" }}>
                <div style={{ fontSize: "48px", marginBottom: "8px" }}>🏆</div>
                <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.gold, letterSpacing: "4px" }}>
                  VALUTAZIONE AI — RISULTATO
                </div>
              </div>
              <div style={{ ...styles.card, border: "1px solid rgba(201,168,76,0.25)",
                background: "rgba(201,168,76,0.04)",
                fontFamily: "'Crimson Text',Georgia,serif", fontSize: "16px",
                lineHeight: "1.85", color: G.text, whiteSpace: "pre-wrap", marginBottom: "20px" }}>
                {evaluation}
              </div>
            </div>
          )}
          {enigma.postStory ? (
            <div style={{ ...styles.card, marginBottom: "20px",
              fontFamily: "'Playfair Display',Georgia,serif",
              fontSize: "15px", lineHeight: "1.9", fontStyle: "italic", color: G.text }}>
              <Linkify text={enigma.postStory} />
            </div>
          ) : null}
          <button className="btn-gold" style={{ ...styles.btnPrimary, width: "100%", padding: "16px", fontSize: "14px" }}
            onClick={onComplete}>
            CONTINUA →
          </button>
        </div>
      )}
    </div>
  );
}


// ─── ENIGMA PREVIEW MODAL ─────────────────────────────────────────────────────
function EnigmaPreviewModal({ enigma, index, total, game, onPrev, onNext, onClose }) {
  const [tab, setTab] = useState("pre");  // pre | puzzle | post
  const [answered, setAnswered] = useState(false);
  const [inputVal, setInputVal] = useState("");
  const [wrongShake, setWrongShake] = useState(false);

  // Reset when enigma changes
  useEffect(() => {
    setTab("pre");
    setAnswered(false);
    setInputVal("");
  }, [enigma.id]);

  const checkAnswer = () => {
    const correct = (enigma.answers || []).some(
      a => a.trim().toLowerCase() === inputVal.trim().toLowerCase()
    );
    if (correct) { setAnswered(true); setTab("post"); }
    else { setWrongShake(true); setTimeout(() => setWrongShake(false), 600); }
  };

  const renderLinks = (raw) => {
    if (!raw) return null;
    return raw.split("\n").filter(Boolean).map((line, i) => {
      const [label, url] = line.split("|").map(s => s.trim());
      const href = url || label;
      return (
        <a key={i} href={href} target="_blank" rel="noopener noreferrer"
          style={{ display: "inline-flex", alignItems: "center", gap: "6px",
            color: G.gold, fontFamily: G.fontMono, fontSize: "12px",
            textDecoration: "none", marginRight: "12px" }}>
          🔗 {label}
        </a>
      );
    });
  };

  const isVideo = (f) => f.type?.startsWith("video/") || /\.(mp4|mpeg|mpg|avi|mov|webm|m4v)$/i.test(f.name || "");

  const renderFiles = (files) => {
    if (!files?.length) return null;
    return (
      <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", marginTop: "12px" }}>
        {files.map((f, i) => {
          if (f.type?.startsWith("image/")) return (
            <img key={i} src={f.data} alt={f.name}
              style={{ maxWidth: "100%", maxHeight: "220px", borderRadius: "4px",
                border: `1px solid ${G.border}`, objectFit: "contain" }} />
          );
          if (isVideoFile(f)) return (
            <video key={i} src={f.data} controls
              style={{ maxWidth: "100%", maxHeight: "220px", borderRadius: "4px", display: "block" }} />
          );
          if (f.type === "application/pdf") return (
            <a key={i} href={f.data} target="_blank" rel="noopener noreferrer"
              style={{ ...styles.tag, color: G.gold, textDecoration: "none" }}>
              📄 {f.name}
            </a>
          );
          return null;
        })}
      </div>
    );
  };

  const TAB_BTN = (id, label, active) => (
    <button
      onClick={() => setTab(id)}
      style={{
        fontFamily: G.fontMono, fontSize: "11px", letterSpacing: "2px",
        padding: "7px 18px", borderRadius: "4px", cursor: "pointer",
        background: active ? "rgba(201,168,76,0.18)" : "transparent",
        border: `1px solid ${active ? G.gold : G.border}`,
        color: active ? G.gold : G.muted,
        transition: "all 0.15s",
      }}
    >{label}</button>
  );

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{
        position: "fixed", inset: 0, zIndex: 11000,
        background: "rgba(0,0,0,0.88)", backdropFilter: "blur(8px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "16px",
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: "680px", maxHeight: "92vh",
          background: G.bg1, borderRadius: "10px",
          border: `1px solid rgba(201,168,76,0.35)`,
          boxShadow: "0 0 80px rgba(201,168,76,0.12), 0 30px 80px rgba(0,0,0,0.9)",
          display: "flex", flexDirection: "column",
          animation: "enigma-reveal 0.3s ease",
          overflow: "hidden",
        }}
      >
        {/* ── Header ── */}
        <div style={{
          display: "flex", alignItems: "center", gap: "12px",
          padding: "16px 20px",
          background: G.bg2, borderBottom: `1px solid ${G.border}`,
          flexShrink: 0,
        }}>
          {/* Admin badge */}
          <div style={{ fontFamily: G.fontMono, fontSize: "9px", color: G.muted,
            letterSpacing: "2px", background: "rgba(201,168,76,0.08)",
            border: `1px solid ${G.border}`, borderRadius: "4px", padding: "3px 8px",
            whiteSpace: "nowrap",
          }}>
            ANTEPRIMA ADMIN
          </div>
          <span style={{ ...styles.tag }}>{index + 1} / {total}</span>
          <span style={{ flex: 1, fontFamily: G.fontMono, fontSize: "13px", color: G.gold,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>
            {enigma.title || `Enigma ${index + 1}`}

          {/* Nav arrows */}
          <button onClick={onPrev} disabled={index === 0}

                  <div style={{ ...styles.card, border: `1px solid rgba(201,168,76,0.2)`,

                </div>
              )}
              {enigma.puzzle && (

              {/* Hints preview */}

function AdminGameEditor({ game, onSave, onBack }) {
  const [g, setG] = useState(game);
  const [saveMsg, setSaveMsg] = useState("");
  const saveTimer = useRef(null);
  const [previewIdx, setPreviewIdx] = useState(null); // index of enigma being previewed

  // On mount: load latest draft from storage (survives re-renders & artifact reloads)
  useEffect(() => {
    (async () => {
      try {
        const draft = await window.storage.get(`draft:${game.id}`);
        if (draft) {
          const parsed = JSON.parse(draft.value);
          setG(parsed);
        }
      } catch {}
    })();
  }, [game.id]);

  // Autosave draft to storage 1s after every change
  const updateG = (updater) => {
    setG(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(async () => {
        try {
          await window.storage.set(`draft:${next.id}`, JSON.stringify(next));
          setSaveMsg("✓ bozza salvata");
          setTimeout(() => setSaveMsg(""), 2000);
        } catch {}
      }, 800);
      return next;
    });
  };

  const updE = (i, e) => updateG((prev) => { const en = [...prev.enigmas]; en[i] = e; return { ...prev, enigmas: en }; });
  const addE      = () => updateG((prev) => ({ ...prev, enigmas: [...prev.enigmas, EMPTY_ENIGMA()] }));
  const addVideoE = () => updateG((prev) => ({ ...prev, enigmas: [...prev.enigmas, EMPTY_VIDEO_ENIGMA()] }));
  const delE = (i) => updateG((prev) => ({ ...prev, enigmas: prev.enigmas.filter((_, j) => j !== i) }));
  const dupE = (i) => updateG((prev) => { const en = [...prev.enigmas]; en.splice(i + 1, 0, { ...en[i], id: uid() }); return { ...prev, enigmas: en }; });

  // Also wrap top-level field changes
  const setGWithSave = (updater) => updateG(updater);

  const handleSave = async () => {
    // On explicit save: persist to games list AND clear draft
    onSave(g);
    try { await window.storage.delete(`draft:${g.id}`); } catch {}
  };

  return (
    <>
    <div style={{ maxWidth: "900px", margin: "0 auto", padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "16px", marginBottom: "28px" }}>
        <button className="btn-outline" style={styles.btn} onClick={onBack}>← Partite</button>
        <h2 style={{ ...styles.title, fontSize: "22px", margin: 0, flex: 1 }}>Modifica Partita</h2>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          {saveMsg && <span style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.success, letterSpacing: "1px" }}>{saveMsg}</span>}
          <button className="btn-gold" style={styles.btnPrimary} onClick={handleSave}>💾 Salva</button>
        </div>
      </div>
      <div style={{ ...styles.card, marginBottom: "20px" }}>
        <h3 style={{ ...styles.title, fontSize: "16px", marginBottom: "16px" }}>⚙️ IMPOSTAZIONI PARTITA</h3>
        <Input label="Nome Partita" value={g.name} onChange={(v) => setGWithSave({ ...g, name: v })} placeholder="Nome della partita..." />
        <PlayersPanel
          players={g.players && g.players.length > 0 ? g.players : [{ id: uid(), name: "Giocatore 1", code: g.code || "1234" }]}
          onChange={(players) => setGWithSave({ ...g, players })}
        />
        <Input label="Personalità AgentX (prompt di sistema)" value={g.agentXPersonality} onChange={(v) => setGWithSave({ ...g, agentXPersonality: v })} rows={3} placeholder="Descrivi il carattere e il tono di AgentX per questa partita..." />
        <div style={{ marginBottom: "16px" }}>
          <label style={styles.label}>Logo Cliente (viene mostrato ai giocatori)</label>
          <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
            <label style={{ ...styles.btn, display: "inline-block", cursor: "pointer", padding: "8px 18px", fontSize: "12px" }}>
              🖼 Carica Logo
              <input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => setGWithSave({ ...g, clientLogo: reader.result });
                reader.readAsDataURL(file);
              }} />
            </label>
            {g.clientLogo && (
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <img src={g.clientLogo} alt="Logo cliente" style={{ height: "48px", maxWidth: "180px", objectFit: "contain", background: "white", padding: "4px", borderRadius: "3px" }} />
                <button className="btn-danger" style={styles.btnDanger} onClick={() => setGWithSave({ ...g, clientLogo: "" })}>✕ Rimuovi</button>
              </div>
            )}
          </div>
        </div>
        <Input label="Storytelling Iniziale del Gioco" value={g.story} onChange={(v) => setGWithSave({ ...g, story: v })} rows={6} placeholder="Inserisci la narrativa di apertura che i giocatori vedranno all'inizio..." />

        {/* ── Immagini Video Cinematico ── */}
        <div style={{ marginTop: "8px" }}>
          <label style={{ ...styles.label, display: "flex", alignItems: "center", gap: "8px" }}>
            🎬 IMMAGINI VIDEO INTRODUTTIVO
            <span style={{ fontFamily: G.fontMono, fontSize: "10px", color: G.muted, fontWeight: "normal" }}>

              {(g.cinematicImages || []).map((img, i) => (

                  <img src={img.data} alt={img.name} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  {/* Order badge */}

                    {i + 1}

                  {/* Move left/right + delete */}
                  <div style={{ position: "absolute", bottom: 0, inset: "auto 0 0 0", background: "rgba(0,0,0,0.7)", display: "flex", justifyContent: "center", gap: "4px", padding: "4px" }}>
                    {i > 0 && (
                      <button onClick={() => {
                        const imgs = [...(g.cinematicImages || [])];
                        [imgs[i-1], imgs[i]] = [imgs[i], imgs[i-1]];
                        setGWithSave({ ...g, cinematicImages: imgs });
                      }} style={{ background: "transparent", border: "none", color: G.gold, cursor: "pointer", fontSize: "12px", padding: "0 4px" }}>◀</button>
                    )}
                    <button onClick={() => setGWithSave({ ...g, cinematicImages: (g.cinematicImages || []).filter((_, j) => j !== i) })}
                      style={{ background: "transparent", border: "none", color: G.red, cursor: "pointer", fontSize: "13px", padding: "0 4px" }}>✕</button>
                    {i < (g.cinematicImages || []).length - 1 && (
                      <button onClick={() => {
                        const imgs = [...(g.cinematicImages || [])];
                        [imgs[i], imgs[i+1]] = [imgs[i+1], imgs[i]];
                        setGWithSave({ ...g, cinematicImages: imgs });
                      }} style={{ background: "transparent", border: "none", color: G.gold, cursor: "pointer", fontSize: "12px", padding: "0 4px" }}>▶</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Upload button */}
          {(g.cinematicImages || []).length < 5 && (
            <label style={{ ...styles.btn, display: "inline-flex", alignItems: "center", gap: "8px", cursor: "pointer", padding: "8px 18px", fontSize: "12px" }}>
              🎞 Aggiungi Immagine ({(g.cinematicImages || []).length}/5)
              <input type="file" accept="image/*" multiple style={{ display: "none" }} onChange={(e) => {
                const files = Array.from(e.target.files).slice(0, 5 - (g.cinematicImages || []).length);
                Promise.all(files.map(f => new Promise(res => {
                  const reader = new FileReader();
                  reader.onload = () => res({ name: f.name, data: reader.result });
                  reader.readAsDataURL(f);
                }))).then(loaded => setG(prev => ({ ...prev, cinematicImages: [...(prev.cinematicImages || []), ...loaded] })));
              }} />
            </label>
          )}
          {(g.cinematicImages || []).length > 0 && (
            <button className="btn-danger" style={{ ...styles.btnDanger, marginLeft: "10px" }} onClick={() => setGWithSave({ ...g, cinematicImages: [] })}>

        </div>
      </div>
      <h3 style={{ ...styles.title, fontSize: "18px", marginBottom: "16px" }}>🧩 ENIGMI</h3>

        <div key={e.id}>

    {/* ── ENIGMA PREVIEW MODAL ── */}
    {previewIdx !== null && g.enigmas[previewIdx] && (
      <EnigmaPreviewModal

        index={previewIdx}

        onNext={() => setPreviewIdx(i => Math.min(g.enigmas.length - 1, i + 1))}
        onClose={() => setPreviewIdx(null)}
      />
    )}
    </>
  );
}

function FormativeReportModal({ scoreData, agentLogData, game, onClose }) {
  const [report,     setReport]     = useState(null);
  const [scoreTable, setScoreTable] = useState(null); // structured table data
  const [loading,    setLoading]    = useState(true);
  const [error,      setError]      = useState(null);
  const [speaking,   setSpeaking]   = useState(false);
  const [speechSupported] = useState(() => "speechSynthesis" in window);
  const utteranceRef = useRef(null);

  // Generate report on mount
  useEffect(() => {
    generateReport();
    return () => { if (utteranceRef.current) window.speechSynthesis.cancel(); };
  }, []);

  const generateReport = async () => {
    setLoading(true); setError(null);
    try {
      // Build context from scores and agentX log
      const scoresText = (scoreData?.scores || []).map((s, i) =>
        `Enigma ${i+1} "${s.title}": risolto in ${Math.floor(s.elapsed/60)}:${String(s.elapsed%60).padStart(2,"0")}, punteggio ${s.score}/10${s.expired ? " (tempo scaduto)" : ""}`
      ).join("\n");

      const agentQuestions = (agentLogData?.log || []).filter(m => m.text).map((m, i) =>
        `[${m.enigmaTitle || "generale"}] "${m.text}"`
      ).join("\n");

      const totalScore = scoreData?.total ?? "N/A";
      const maxScore   = (scoreData?.scores?.length || 0) * 10;
      const playerCode = scoreData?.playerCode || agentLogData?.playerCode || "—";
      const playerName = scoreData?.playerName || agentLogData?.playerName || "Team";
      const gameName   = scoreData?.gameName   || agentLogData?.gameName   || game?.name || "—";

      // ── CALL 1: narrative report (unchanged original) ─────────────────
      const prompt = `Sei un esperto di team building e sviluppo organizzativo. Hai supervisionato una sessione di escape game formativo chiamata "${gameName}" per il gruppo con codice "${playerCode}" (${playerName}).

Ecco i dati raccolti durante la sessione:

PRESTAZIONI PER ENIGMA:
${scoresText || "Nessun dato di punteggio disponibile"}

PUNTEGGIO TOTALE: ${totalScore} su ${maxScore} punti

DOMANDE E RICHIESTE DI AIUTO AD AGENTX (l'assistente IA durante il gioco):
${agentQuestions || "Nessuna domanda posta ad AgentX"}

In base a questi dati, scrivi un REPORT FORMATIVO in italiano. Il report deve:
1. Avere un titolo e una valutazione generale del team (max 2 righe)
2. Analizzare la COLLABORAZIONE: come si sono organizzati, divisione dei ruoli, sincronizzazione
3. Analizzare la GESTIONE DEL TEMPO: velocità di risposta, pressione del timer, efficienza
4. Analizzare la MODALITÀ DI PROBLEM SOLVING: approccio autonomo vs. richiesta di aiuto, tipo di domande fatte
5. PUNTI DI FORZA del team (2-3 bullet)
6. AREE DI MIGLIORAMENTO (2-3 bullet)
7. RACCOMANDAZIONE FORMATIVA: un'attività o workshop specifico da suggerire per rafforzare le aree deboli

Tono: professionale ma accessibile. Lunghezza: 400-600 parole. Non inventare dati che non hai — se mancano informazioni, basati su ciò che hai.`;

      const apiCall = (body) => fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", ...body }),
      });

      const r1 = await apiCall({ max_tokens: 1200, messages: [{ role: "user", content: prompt }] });
      const d1 = await r1.json();
      if (!r1.ok) throw new Error(d1.error?.message || `HTTP ${r1.status}`);
      setReport(d1.content?.find(c => c.type === "text")?.text || "");

      // ── CALL 2: structured table only ─────────────────────────────────
      const tablePrompt = `Stai analizzando una sessione di escape game formativo.

Dati disponibili:
- Enigmi: ${scoresText || "N/D"}
- Punteggio: ${totalScore}/${maxScore}
- Domande fatte all'IA: ${agentQuestions || "Nessuna"}

Rispondi SOLO con un array JSON valido (nessun testo fuori dal JSON):
[
  { "parametro": "Punti di forza", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Punti di debolezza", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Comunicazione interna", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Gestione del tempo", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Problem solving", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Autonomia decisionale", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Uso delle risorse IA", "voto": <numero 1-10>, "dettaglio": "<frase breve>" },
  { "parametro": "Coesione del team", "voto": <numero 1-10>, "dettaglio": "<frase breve>" }
]
Inferisci i voti dai dati. Non inventare.`;

      const r2 = await apiCall({ max_tokens: 600, messages: [{ role: "user", content: tablePrompt }] });
      const d2 = await r2.json();
      if (r2.ok) {
        try {
          const raw2 = d2.content?.find(c => c.type === "text")?.text || "";
          const clean = raw2.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
          setScoreTable(JSON.parse(clean));
        } catch {}
      }

    } catch(e) {
      setError(e.message || "Errore nella generazione del report");
    }
    setLoading(false);
  };

  // TTS — read report aloud
  const speak = () => {
    if (!speechSupported || !report) return;
    if (speaking) {
      window.speechSynthesis.cancel();
      setSpeaking(false);
      return;
    }
    // Try to find an Italian voice
    const voices = window.speechSynthesis.getVoices();
    const itVoice = voices.find(v => v.lang.startsWith("it")) || null;
    const utt = new SpeechSynthesisUtterance(report.replace(/[*#]/g, ""));
    utt.lang = "it-IT";
    utt.rate = 0.92;
    utt.pitch = 1;
    if (itVoice) utt.voice = itVoice;
    utt.onend   = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    utteranceRef.current = utt;
    window.speechSynthesis.speak(utt);
    setSpeaking(true);
  };

  // Render markdown-lite: bold, bullets
  const renderReport = (text) => {
    if (!text) return null;
    return text.split("\n").map((line, i) => {
      if (!line.trim()) return <div key={i} style={{ height: "8px" }} />;
      // Heading (## or **Title**)
      if (line.startsWith("## ") || line.startsWith("# ")) {
        const t = line.replace(/^#+\s*/, "");
        return <h3 key={i} style={{ ...styles.title, fontSize: "15px", color: G.gold, margin: "16px 0 6px", letterSpacing: "1px" }}>{t}</h3>;
      }
      // Bold line (starts with **)
      if (/^\*\*(.+)\*\*$/.test(line.trim())) {
        const t = line.trim().replace(/\*\*/g, "");
        return <p key={i} style={{ fontWeight: "bold", color: G.text, margin: "10px 0 2px" }}>{t}</p>;
      }
      // Bullet
      if (line.trim().startsWith("- ") || line.trim().startsWith("• ")) {
        const t = line.trim().replace(/^[-•]\s*/, "");
        // inline bold
        const parts = t.split(/(\*\*[^*]+\*\*)/g).map((p, j) =>
          p.startsWith("**") ? <strong key={j}>{p.replace(/\*\*/g, "")}</strong> : p
        );
        return (
          <div key={i} style={{ display: "flex", gap: "8px", margin: "4px 0", paddingLeft: "4px" }}>
            <span style={{ color: G.gold, flexShrink: 0 }}>▸</span>
            <span style={{ lineHeight: "1.6", color: G.text }}>{parts}</span>
          </div>
        );
      }
      // Normal paragraph with inline bold
      const parts = line.split(/(\*\*[^*]+\*\*)/g).map((p, j) =>
        p.startsWith("**") ? <strong key={j}>{p.replace(/\*\*/g, "")}</strong> : p
      );
      return <p key={i} style={{ margin: "4px 0", lineHeight: "1.7", color: G.text }}>{parts}</p>;
    });
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 10000,
      background: "rgba(0,0,0,0.92)", backdropFilter: "blur(8px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }} onClick={e => { if (e.target === e.currentTarget) { window.speechSynthesis?.cancel(); onClose(); } }}>
      <div style={{
        ...styles.card,
        maxWidth: "720px", width: "100%", maxHeight: "90vh",
        display: "flex", flexDirection: "column",
        border: "1px solid rgba(201,168,76,0.4)",
        boxShadow: "0 0 80px rgba(201,168,76,0.15)",
        animation: "enigma-reveal 0.4s ease",
      }} onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "20px", flexShrink: 0 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: G.muted, letterSpacing: "3px", marginBottom: "4px" }}>ANALISI FORMATIVA IA</div>
            <h2 style={{ ...styles.title, fontSize: "20px", margin: 0 }}>
              📊 Report Formativo — {scoreData?.playerName || agentLogData?.playerName || "Team"}
            </h2>
          </div>
          <div style={{ display: "flex", gap: "8px", flexShrink: 0 }}>
            {speechSupported && report && (
              <button
                onClick={speak}
                style={{
                  ...styles.btn,
                  padding: "8px 16px", fontSize: "13px",
                  background: speaking ? "rgba(201,168,76,0.2)" : "transparent",
                  borderColor: speaking ? G.gold : G.border,
                  color: speaking ? G.gold : G.muted,
                  display: "flex", alignItems: "center", gap: "6px",
                }}
              >
                {speaking ? "⏹ Stop" : "🔊 Ascolta"}
              </button>
            )}
            <button onClick={() => { window.speechSynthesis?.cancel(); onClose(); }}
              style={{ ...styles.btnDanger, padding: "8px 14px" }}>✕</button>
          </div>
        </div>

        {/* Content */}
        <div style={{ flex: 1, overflowY: "auto", paddingRight: "4px" }}>
          {loading && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "16px", padding: "60px 20px" }}>
              <div style={{ width: "48px", height: "48px", border: "3px solid rgba(201,168,76,0.2)", borderTop: "3px solid #c9a84c", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
              <div style={{ fontFamily: G.fontMono, fontSize: "13px", color: G.muted, letterSpacing: "2px" }}>ANALISI IN CORSO…</div>
              <div style={{ fontFamily: G.fontMono, fontSize: "10px", color: "rgba(201,168,76,0.4)", letterSpacing: "1px", textAlign: "center" }}>
                L'IA sta elaborando i dati di sessione,<br/>le prestazioni e le interazioni del team
              </div>
            </div>
          )}

          {error && (
            <div style={{ padding: "24px", textAlign: "center" }}>
              <div style={{ fontSize: "40px", marginBottom: "12px" }}>⚠️</div>
              <p style={{ color: G.red, fontFamily: G.fontMono, fontSize: "13px", marginBottom: "16px" }}>{error}</p>
              <button className="btn-outline" style={styles.btn} onClick={generateReport}>↺ Riprova</button>
            </div>
          )}

          {report && !loading && (
            <div style={{ fontSize: "15px", lineHeight: "1.7", fontFamily: G.fontBody }}>
              {/* Speaking progress bar */}
              {speaking && (
                <div style={{ marginBottom: "16px", height: "2px", background: G.border, borderRadius: "2px", overflow: "hidden" }}>
                  <div style={{ height: "100%", background: G.gold, animation: "scanline 8s linear infinite", width: "30%" }} />
                </div>
              )}

              {/* Narrative text (original report, untouched) */}
              {renderReport(report)}

              {/* ── TABELLA RIEPILOGATIVA ── */}
              {scoreTable?.tabella?.length > 0 && (
                <div style={{ marginTop: "32px" }}>
                  <div style={{ fontFamily: G.fontMono, fontSize: "11px", color: G.muted, letterSpacing: "3px", marginBottom: "14px", paddingTop: "16px", borderTop: `1px solid ${G.border}` }}>
                    ANALISI PARAMETRI — RIEPILOGO
                  </div>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: G.fontMono, fontSize: "13px" }}>
                      <thead>
                        <tr style={{ borderBottom: `2px solid rgba(201,168,76,0.3)` }}>
                          <th style={{ textAlign: "left", padding: "10px 14px 10px 0", color: G.muted, fontSize: "10px", letterSpacing: "2px", fontWeight: "normal" }}>PARAMETRO</th>
                          <th style={{ textAlign: "center", padding: "10px 14px", color: G.muted, fontSize: "10px", letterSpacing: "2px", fontWeight: "normal", whiteSpace: "nowrap" }}>VOTO</th>
                          <th style={{ textAlign: "left", padding: "10px 0 10px 14px", color: G.muted, fontSize: "10px", letterSpacing: "2px", fontWeight: "normal" }}>DETTAGLIO</th>
                        </tr>
                      </thead>
                      <tbody>
                        {scoreTable.tabella.map((row, i) => {
                          const v = Number(row.voto) || 0;
                          const barColor = v >= 7 ? "#2ecc71" : v >= 5 ? "#c9a84c" : "#e74c3c";
                          return (
                            <tr key={i} style={{ borderBottom: `1px solid ${G.border}` }}>
                              <td style={{ padding: "12px 14px 12px 0", color: G.text, fontWeight: "600", whiteSpace: "nowrap", fontSize: "13px" }}>
                                {row.parametro}
                              </td>
                              <td style={{ padding: "12px 14px", textAlign: "center", minWidth: "90px" }}>
                                <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: "5px" }}>
                                  <span style={{ color: barColor, fontSize: "17px", fontWeight: "bold", lineHeight: 1 }}>{v}</span>
                                  <div style={{ width: "56px", height: "4px", background: "rgba(255,255,255,0.08)", borderRadius: "2px", overflow: "hidden" }}>
                                    <div style={{ width: `${v * 10}%`, height: "100%", background: barColor, borderRadius: "2px", transition: "width 0.6s ease" }} />
                                  </div>
                                  <span style={{ fontSize: "9px", color: G.muted, letterSpacing: "1px" }}>/10</span>
                                </div>
                              </td>
                              <td style={{ padding: "12px 0 12px 14px", color: G.muted, fontSize: "12px", lineHeight: "1.5" }}>
                                {row.dettaglio}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Footer actions */}
        {report && !loading && (
          <div style={{ marginTop: "20px", paddingTop: "16px", borderTop: `1px solid ${G.border}`, display: "flex", justifyContent: "flex-end", gap: "10px", flexShrink: 0 }}>
            <button
              onClick={() => {
                let txt = "";
                if (scoreTable?.titolo) txt += scoreTable.titolo + "\n" + (scoreTable.valutazione || "") + "\n\n";
                txt += report + "\n";
                if (scoreTable?.tabella?.length > 0) {
                  txt += "\n--- RIEPILOGO PARAMETRI ---\n";
                  scoreTable.tabella.forEach(r => {
                    txt += `${r.parametro}: ${r.voto}/10 — ${r.dettaglio}\n`;
                  });
                }
                const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url;
                a.download = `report-formativo-${scoreData?.playerCode || "team"}.txt`;
                a.click(); URL.revokeObjectURL(url);
              }}
              style={{ ...styles.btn, padding: "8px 18px", fontSize: "12px", display: "flex", alignItems: "center", gap: "6px" }}
            >
              ⬇ Scarica .txt
            </button>
            <button onClick={() => { window.speechSynthesis?.cancel(); onClose(); }}
              style={{ ...styles.btnPrimary, padding: "8px 22px", fontSize: "13px" }}
              className="btn-gold">Chiudi</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SCOREBOARD PANEL (used in AdminDashboard) ───────────────────────────────
function ScoreboardPanel({ games }) {
  const [allScores, setAllScores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedGame, setSelectedGame] = useState("all");
  const [agentLogs, setAgentLogs] = useState({});
  const [reportTarget, setReportTarget] = useState(null); // {scoreData, agentLogData}
  const [deleting, setDeleting] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null); // {msg, onConfirm}

  const doDeleteEntry = async (gameId, playerCode) => {
    const key = `${gameId}:${playerCode}`;
    setDeleting(key);
    try { await window.storage.delete(`scores:${gameId}:${playerCode}`); } catch {}
    try { await window.storage.delete(`agentlog:${gameId}:${playerCode}`); } catch {}
    setAllScores(prev => prev.filter(s => !(s.gameId === gameId && s.playerCode === playerCode)));
    setAgentLogs(prev => { const n = {...prev}; delete n[`${gameId}:${playerCode}`]; return n; });
    setDeleting(null);
  };

  const doDeleteAll = async (gameId) => {
    setDeleting(`bulk`);
    const targets = gameId === "all" ? allScores : allScores.filter(s => s.gameId === gameId);
    for (const s of targets) {
      try { await window.storage.delete(`scores:${s.gameId}:${s.playerCode}`); } catch {}
      try { await window.storage.delete(`agentlog:${s.gameId}:${s.playerCode}`); } catch {}
    }
    setAllScores(prev => gameId === "all" ? [] : prev.filter(s => s.gameId !== gameId));
    setDeleting(null);
  };

  const confirm = (msg, onConfirm) => setConfirmDialog({ msg, onConfirm });

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        // Load scores
        const keys = await window.storage.list("scores:");
        const entries = await Promise.all(
          (keys.keys || []).map(async (k) => {
            try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; }
            catch { return null; }
          })
        );
        setAllScores(entries.filter(Boolean).sort((a, b) => b.total - a.total));
        // Load agentX logs
        const logKeys = await window.storage.list("agentlog:");
        const logs = {};
        await Promise.all((logKeys.keys || []).map(async (k) => {
          try {
            const r = await window.storage.get(k);
            if (r) {
              const d = JSON.parse(r.value);
              logs[`${d.gameId}:${d.playerCode}`] = d;
            }
          } catch {}
        }));
        setAgentLogs(logs);
      } catch {}
      setLoading(false);
    })();
  }, []);

  const filtered = selectedGame === "all"
    ? allScores
    : allScores.filter(s => s.gameId === selectedGame);

  if (loading) return (
    <div style={{ textAlign: "center", padding: "40px", color: G.muted, fontFamily: G.fontMono, fontSize: "13px" }}>
      <div style={{ fontSize: "24px", animation: "spin 1s linear infinite", display: "inline-block", marginBottom: "8px" }}>◌</div>
      <div>Caricamento punteggi…</div>
    </div>
  );

  return (
    <>
    <div>
      {/* Filter by game */}
      {games.length > 1 && (
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "16px" }}>
          <button style={{
            fontFamily: G.fontMono, fontSize: "11px", padding: "5px 14px", borderRadius: "4px", cursor: "pointer",
            background: selectedGame === "all" ? "rgba(201,168,76,0.2)" : "transparent",
            border: `1px solid ${selectedGame === "all" ? G.gold : G.border}`,
            color: selectedGame === "all" ? G.gold : G.muted,
          }} onClick={() => setSelectedGame("all")}>Tutte</button>
          {games.map(g => (
            <button key={g.id} style={{
              fontFamily: G.fontMono, fontSize: "11px", padding: "5px 14px", borderRadius: "4px", cursor: "pointer",
              background: selectedGame === g.id ? "rgba(201,168,76,0.2)" : "transparent",
              border: `1px solid ${selectedGame === g.id ? G.gold : G.border}`,
              color: selectedGame === g.id ? G.gold : G.muted,
            }} onClick={() => setSelectedGame(g.id)}>{g.name}</button>
          ))}
        </div>
      )}

      {/* Delete all button for current filter */}
      {filtered.length > 0 && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "12px" }}>
          <button
            onClick={() => confirm(selectedGame === "all" ? "Cancellare TUTTA la classifica?" : "Cancellare tutti i punteggi per questa partita?", () => doDeleteAll(selectedGame))}
            disabled={!!deleting}
            style={{
              fontFamily: G.fontMono, fontSize: "10px", letterSpacing: "1px",
              background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.35)",
              borderRadius: "4px", padding: "5px 14px", cursor: "pointer",
              color: "#c0392b", display: "flex", alignItems: "center", gap: "6px",
              opacity: deleting ? 0.5 : 1,
            }}
          >
            🗑 {selectedGame === "all" ? "Svuota tutta la classifica" : "Svuota classifica partita"}
          </button>
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px", color: G.muted, fontFamily: G.fontMono, fontSize: "13px" }}>
          <div style={{ fontSize: "36px", marginBottom: "8px" }}>📊</div>
          Nessun punteggio ancora registrato
        </div>
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: G.fontMono, fontSize: "13px" }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${G.border}` }}>
                <th style={{ padding: "10px 12px", textAlign: "left", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>#</th>
                <th style={{ padding: "10px 12px", textAlign: "left", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>GIOCATORE</th>
                <th style={{ padding: "10px 12px", textAlign: "left", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>PARTITA</th>
                <th style={{ padding: "10px 12px", textAlign: "left", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>ENIGMI</th>
                <th style={{ padding: "10px 12px", textAlign: "right", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>TOTALE</th>
                <th style={{ padding: "10px 12px", textAlign: "right", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}>DATA</th>
                <th style={{ padding: "10px 8px", textAlign: "right", color: G.muted, letterSpacing: "2px", fontSize: "10px", fontWeight: "normal" }}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((s, rank) => {
                const medal = rank === 0 ? "🥇" : rank === 1 ? "🥈" : rank === 2 ? "🥉" : null;
                const gameObj = games.find(g => g.id === s.gameId);
                const maxPts = gameObj ? gameObj.enigmas.length * 10 : "?";
                return (
                  <tr key={`${s.gameId}-${s.playerCode}`} style={{
                    borderBottom: `1px solid ${G.border}`,
                    background: rank === 0 ? "rgba(201,168,76,0.05)" : "transparent",
                  }}>
                    <td style={{ padding: "12px 12px", color: G.muted }}>{medal || rank + 1}</td>
                    <td style={{ padding: "12px 12px" }}>
                      <div style={{ color: G.text }}>{s.playerName}</div>
                      <div style={{ color: G.muted, fontSize: "11px", letterSpacing: "2px" }}>{s.playerCode}</div>
                    </td>
                    <td style={{ padding: "12px 12px", color: G.muted, fontSize: "12px" }}>{s.gameName}</td>
                    <td style={{ padding: "12px 12px" }}>
                      <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
                        {(s.scores || []).map((e, i) => (
                          <span key={i} style={{
                            display: "inline-block", padding: "2px 7px", borderRadius: "3px",
                            fontSize: "11px", fontWeight: "bold",
                            background: e.score >= 7 ? "rgba(46,204,113,0.15)" : e.score >= 4 ? "rgba(201,168,76,0.15)" : "rgba(192,57,43,0.15)",
                            color: e.score >= 7 ? G.success : e.score >= 4 ? G.gold : G.red,
                            border: `1px solid ${e.score >= 7 ? "rgba(46,204,113,0.3)" : e.score >= 4 ? "rgba(201,168,76,0.3)" : "rgba(192,57,43,0.3)"}`,
                          }} title={`${e.title} — ${Math.floor(e.elapsed/60)}:${String(e.elapsed%60).padStart(2,"0")}${e.expired ? " (handicap)" : ""}`}>
                            {e.score}
                          </span>
                        ))}
                      </div>
                    </td>
                    <td style={{ padding: "12px 12px", textAlign: "right" }}>
                      <span style={{ fontSize: "22px", fontWeight: "bold", color: G.gold }}>{s.total}</span>
                      <span style={{ color: G.muted, fontSize: "11px", marginLeft: "4px" }}>/{maxPts}</span>
                    </td>
                    <td style={{ padding: "12px 12px", textAlign: "right", color: G.muted, fontSize: "11px" }}>
                      {s.completedAt ? new Date(s.completedAt).toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—"}
                    </td>
                    <td style={{ padding: "12px 8px", textAlign: "right" }}>
                      <div style={{ display: "flex", gap: "6px", justifyContent: "flex-end", alignItems: "center" }}>
                        <button
                          onClick={() => setReportTarget({
                            scoreData: s,
                            agentLogData: agentLogs[`${s.gameId}:${s.playerCode}`] || null,
                          })}
                          style={{
                            fontFamily: G.fontMono, fontSize: "10px", letterSpacing: "1px",
                            background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.4)",
                            borderRadius: "4px", padding: "5px 12px", cursor: "pointer", color: G.gold,
                            whiteSpace: "nowrap",
                          }}
                        >📊 Report IA</button>
                        <button
                          onClick={() => confirm(`Cancellare i dati di ${s.playerName} (${s.playerCode})?`, () => doDeleteEntry(s.gameId, s.playerCode))}
                          disabled={deleting === `${s.gameId}:${s.playerCode}`}
                          title="Cancella punteggio e log"
                          style={{
                            background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.35)",
                            borderRadius: "4px", padding: "5px 8px", cursor: "pointer", color: "#c0392b",
                            fontSize: "13px", lineHeight: 1, opacity: deleting === `${s.gameId}:${s.playerCode}` ? 0.4 : 1,
                          }}
                        >🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>

    {/* Formative Report Modal */}
    {reportTarget && (
      <FormativeReportModal
        scoreData={reportTarget.scoreData}
        agentLogData={reportTarget.agentLogData}
        game={games.find(g => g.id === reportTarget.scoreData?.gameId)}
        onClose={() => setReportTarget(null)}
      />
    )}

    {/* Inline Confirm Dialog */}
    {confirmDialog && (
      <div style={{
        position: "fixed", inset: 0, zIndex: 20000,
        background: "rgba(0,0,0,0.75)", backdropFilter: "blur(4px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "20px",
      }}>
        <div style={{
          background: "#1a1614", border: "1px solid rgba(192,57,43,0.5)",
          borderRadius: "10px", padding: "28px 32px", maxWidth: "380px", width: "100%",
          boxShadow: "0 20px 60px rgba(0,0,0,0.8)",
          animation: "enigma-reveal 0.2s ease",
          textAlign: "center",
        }}>
          <div style={{ fontSize: "36px", marginBottom: "12px" }}>🗑</div>
          <p style={{ fontFamily: "'Courier New',monospace", fontSize: "14px", color: "#e8e0d0", marginBottom: "24px", lineHeight: 1.6 }}>
            {confirmDialog.msg}
          </p>
          <div style={{ display: "flex", gap: "12px", justifyContent: "center" }}>
            <button
              onClick={() => setConfirmDialog(null)}
              style={{
                fontFamily: "'Courier New',monospace", fontSize: "12px", letterSpacing: "1px",
                background: "transparent", border: "1px solid rgba(255,255,255,0.2)",
                borderRadius: "6px", padding: "10px 24px", cursor: "pointer", color: "#7a7068",
              }}
            >Annulla</button>
            <button
              onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }}
              style={{
                fontFamily: "'Courier New',monospace", fontSize: "12px", letterSpacing: "1px",
                background: "rgba(192,57,43,0.15)", border: "1px solid rgba(192,57,43,0.6)",
                borderRadius: "6px", padding: "10px 24px", cursor: "pointer", color: "#e74c3c",
                fontWeight: "bold",
              }}
            >🗑 Conferma</button>
          </div>
        </div>
      </div>
    )}
    </>
  );
}

function AdminDashboard({ games, adminPassword, onEdit, onNewGame, onDeleteGame, onChangePassword, onBack }) {

  const [pwdMsg, setPwdMsg] = useState("");
  const [reportTarget, setReportTarget] = useState(null); // {playerCode, playerName, gameId, gameName}

// ─── AGENTX CHAT ─────────────────────────────────────────────────────────────
function AgentXChat({ game, currentEnigma, onClose, onUserMessage }) {
  const [msgs, setMsgs] = useState([
    { role: "assistant", text: `Agente, ti stavo aspettando. Sono AgentX. Sono qui per guidarti attraverso le ombre. Cosa vuoi sapere?` },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [hintCount, setHintCount] = useState(0);
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput("");
    // Notify parent to log this message
    if (onUserMessage) onUserMessage({ text, enigmaTitle: currentEnigma?.title || null, ts: Date.now() });
    const newMsgs = [...msgs, { role: "user", text }];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const hints = currentEnigma?.hints?.filter(Boolean) || [];
      const hintText = hints.length > 0 ? `\n\nIndizi disponibili per questo enigma (da dare progressivamente se richiesti):\n${hints.map((h, i) => `Indizio ${i + 1}: ${h}`).join("\n")}` : "";
      const enigmaCtx = currentEnigma
        ? `\n\nL'enigma corrente è: "${currentEnigma.title}"\nDescrizione: ${currentEnigma.description}\nPuzzle: ${currentEnigma.puzzle}${hintText}`
        : "";
      const systemPrompt = `${game.agentXPersonality || "Sei AgentX, un agente misterioso."}\n\nContesto della partita: ${game.story}${enigmaCtx}\n\nIMPORTANTE: Non rivelare mai la risposta diretta. Dai indizi progressivi solo se il giocatore li chiede esplicitamente. Mantieni sempre il tono narrativo misterioso. Rispondi sempre in modo BREVE e CONCISO: massimo 2-3 frasi per messaggio. Niente lunghi monologhi.`;
      const apiMessages = newMsgs.map((m) => ({ role: m.role, content: m.text }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 300,
          system: systemPrompt,
          messages: apiMessages,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
      const reply = data.content?.find((c) => c.type === "text")?.text || "...";
      setMsgs((prev) => [...prev, { role: "assistant", text: reply }]);
    } catch (err) {
      setMsgs((prev) => [...prev, { role: "assistant", text: `[AgentX] Errore: ${err.message}` }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", bottom: "20px", right: "20px", width: "360px", maxWidth: "calc(100vw - 40px)", zIndex: 1000, display: "flex", flexDirection: "column", background: G.bg2, border: `1px solid rgba(201,168,76,0.4)`, borderRadius: "6px", boxShadow: "0 20px 60px rgba(0,0,0,0.8)", overflow: "hidden", maxHeight: "70vh" }}>
      <div style={{ background: "rgba(201,168,76,0.1)", padding: "12px 16px", display: "flex", alignItems: "center", gap: "10px", borderBottom: `1px solid ${G.border}` }}>
        <div style={{ width: "8px", height: "8px", background: G.success, borderRadius: "50%", animation: "flicker 2s infinite" }} />
        <span style={{ ...styles.title, fontSize: "14px", flex: 1 }}>AGENTX — Online</span>
        <button style={{ ...styles.btn, padding: "2px 10px", fontSize: "11px" }} onClick={onClose}>✕</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: "12px", minHeight: "200px" }}>
        {msgs.map((m, i) => (
          <div key={i} className="chat-bubble" style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth: "80%", padding: "10px 14px", borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px", background: m.role === "user" ? "rgba(201,168,76,0.15)" : G.bg3, border: `1px solid ${m.role === "user" ? "rgba(201,168,76,0.3)" : G.border}`, fontSize: "14px", lineHeight: "1.5", fontFamily: m.role === "assistant" ? G.fontMono : G.fontBody, color: m.role === "assistant" ? G.goldLight : G.text }}>
              {m.role === "assistant" && <span style={{ color: G.gold, fontSize: "11px", display: "block", marginBottom: "4px" }}>AgentX</span>}
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: "4px", padding: "8px" }}>
            {[0, 1, 2].map((i) => (
              <div key={i} style={{ width: "6px", height: "6px", background: G.gold, borderRadius: "50%", animation: `flicker ${0.6 + i * 0.2}s ease infinite` }} />
            ))}
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ padding: "12px", borderTop: `1px solid ${G.border}`, display: "flex", gap: "8px" }}>
        <input
          style={{ ...styles.input, fontSize: "14px", flex: 1 }}
          value={input}
          onChange={(e) => setInput(e.target.value)}
          placeholder="Chiedi ad AgentX..."
          onKeyDown={(e) => e.key === "Enter" && send()}
        />
        <button className="btn-gold" style={{ ...styles.btnPrimary, padding: "8px 14px", whiteSpace: "nowrap" }} onClick={send}>→</button>
      </div>

  );
}

function useTypewriter(text, active, speed = 32) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!active) { setDisplayed(""); setDone(false); return; }
    setDisplayed("");
    setDone(false);
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i >= text.length) { clearInterval(iv); setDone(true); }
    }, speed);
    return () => clearInterval(iv);
  }, [text, active]);
  return { displayed, done };
}

// ─── VOICE ENGINE ────────────────────────────────────────────────────────────
function useVoice() {
  const synthRef = useRef(window.speechSynthesis);

  // Score voices — higher = more natural
  const scoreVoice = useCallback((v) => {
    let s = 0;
    const n = v.name.toLowerCase();
    const l = v.lang.toLowerCase();
    if (l.startsWith("it")) s += 100;
    if (/natural|neural|online|enhanced/i.test(n)) s += 80;
    if (/google italiano/i.test(n)) s += 60;
    if (/alice/i.test(n) && l.startsWith("it")) s += 50;
    if (/elsa|federica|luca/i.test(n)) s += 40;
    if (/google/i.test(n)) s += 30;
    if (/microsoft/i.test(n) && !/zira|hazel/i.test(n)) s += 20;
    if (l.startsWith("en-gb") || l.startsWith("en-au")) s += 10;
    return s;
  }, []);

  const pickBestVoice = useCallback(() => {
    const voices = synthRef.current.getVoices();
    if (!voices.length) return null;
    return [...voices].sort((a, b) => scoreVoice(b) - scoreVoice(a))[0];
  }, [scoreVoice]);

  // Split text into natural sentence chunks with pause timing
  const preprocess = (raw) => {
    const cleaned = raw
      .replace(/\n+/g, " . ")
      .replace(/([.!?])\s+/g, "$1||")
      .replace(/,\s+/g, ",|")
      .replace(/—|–/g, ", ")
      .replace(/\|\|/g, "\n")
      .replace(/\|/g, "\n");
    return cleaned.split("\n").map(s => s.trim()).filter(s => s.length > 1)
      .map((s, i, arr) => ({
        text: s.replace(/,$/, ""),
        pauseAfter: /[.!?]$/.test(s) ? 420 : /,$/.test(s) ? 180 : 260,
        isLast: i === arr.length - 1,
      }));
  };

  // Speak sentence by sentence for natural delivery
  const speakChunked = useCallback((rawText, { onEnd } = {}, voiceOverride = null) => {
    try {
      synthRef.current.cancel();
      if (!rawText?.trim()) return;
      const voice = voiceOverride || pickBestVoice();
      const chunks = preprocess(rawText);
      let idx = 0;
      const speakNext = () => {
        if (idx >= chunks.length) { onEnd?.(); return; }
        const chunk = chunks[idx++];
        setTimeout(() => {
          const utt = new SpeechSynthesisUtterance(chunk.text);
          if (voice) { utt.voice = voice; utt.lang = voice.lang; }
          utt.rate   = 0.90;  // slightly slower than default — natural pacing
          utt.pitch  = 0.95;  // barely below default — subtle gravitas, fully clear
          utt.volume = 1.0;
          utt.onend   = speakNext;
          utt.onerror = speakNext;
          synthRef.current.speak(utt);
        }, idx === 1 ? 0 : chunk.pauseAfter);
      };
      speakNext();
    } catch { onEnd?.(); }
  }, [pickBestVoice]);

  const stop = useCallback(() => {
    try { synthRef.current.cancel(); } catch {}
  }, []);

  useEffect(() => {
    const load = () => synthRef.current.getVoices();
    load();
    synthRef.current.addEventListener("voiceschanged", load);
    return () => synthRef.current.removeEventListener("voiceschanged", load);
  }, []);

  return { speakChunked, stop, pickBestVoice, scoreVoice };
}

// ─── TYPEWRITER + VOICE COMPONENT ────────────────────────────────────────────
function TypewriterVoice({ text, speed = 30, voiceDelay = 400, autoPlay = true, style = {} }) {
  const [displayed,  setDisplayed]  = useState("");
